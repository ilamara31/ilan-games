<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>One More Try</title>
<link rel="manifest" href="../manifest.webmanifest" />
<meta name="theme-color" content="#0a0e1a" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; }
  html,body { height:100%; overflow:hidden; font-family:'Trebuchet MS','Segoe UI',system-ui,sans-serif; background:#0a0e1a; color:#fff; }
  #wrap { position:fixed; inset:0; }
  canvas { display:block; width:100%; height:100%; touch-action:none; }

  /* ---- HUD ---- */
  #hud { position:absolute; top:0; left:0; right:0; display:flex; justify-content:space-between; align-items:center;
    padding:max(12px,env(safe-area-inset-top)) 18px 0; font-weight:800; font-size:18px; pointer-events:none; text-shadow:0 2px 6px rgba(0,0,0,.5); }
  #hud .chip { background:rgba(8,12,26,.5); padding:7px 14px; border-radius:30px; backdrop-filter:blur(6px); }
  #hud .coins { color:#ffd54a; }
  #twistTag { position:absolute; top:max(56px,calc(env(safe-area-inset-top) + 44px)); left:50%; transform:translateX(-50%);
    background:rgba(8,12,26,.5); padding:5px 14px; border-radius:30px; font-size:13px; font-weight:700; color:#9fd8ff; pointer-events:none; backdrop-filter:blur(6px); }

  /* ---- big twist banner ---- */
  #banner { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    pointer-events:none; opacity:0; }
  #banner.show { animation:bannerPop 1.5s ease forwards; }
  #banner .big { font-size:clamp(30px,9vw,58px); font-weight:900; letter-spacing:1px; text-shadow:0 4px 18px rgba(0,0,0,.6); }
  #banner .small { font-size:clamp(16px,4.5vw,24px); font-weight:800; margin-top:8px; color:#ffe98a; }
  @keyframes bannerPop { 0%{opacity:0;transform:scale(.6)} 15%{opacity:1;transform:scale(1.06)} 30%{transform:scale(1)} 80%{opacity:1} 100%{opacity:0;transform:scale(1)} }

  /* ---- overlays ---- */
  .ov { position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center;
    padding:26px; text-align:center; gap:14px; background:rgba(6,9,20,.72); backdrop-filter:blur(4px); }
  .ov.show { display:flex; animation:fade .2s ease; }
  @keyframes fade { from{opacity:0} to{opacity:1} }
  .title { font-size:clamp(40px,12vw,78px); font-weight:900; line-height:.95;
    background:linear-gradient(90deg,#ffd54a,#ff7b3d); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .deadtitle { background:linear-gradient(90deg,#ff5b6e,#ff2e63); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .wintitle { background:linear-gradient(90deg,#7CFFB2,#39ff88); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .lvltxt { font-size:20px; font-weight:800; color:#cfe0ff; }
  .stat { font-size:17px; font-weight:700; color:#9fd8ff; max-width:340px; line-height:1.45; }
  .stat b { color:#ffd54a; }
  .btn { pointer-events:auto; border:none; border-radius:30px; font-weight:900; cursor:pointer;
    padding:18px 40px; font-size:22px; color:#04220f; background:linear-gradient(135deg,#39ff88,#1ea85a);
    box-shadow:0 8px 22px rgba(40,220,120,.45); transition:transform .08s; }
  .btn:active { transform:scale(.94); }
  .btn.retry { background:linear-gradient(135deg,#ffd54a,#ff8c3d); color:#241600; box-shadow:0 8px 22px rgba(255,170,60,.45); }
  .btn.sm { padding:12px 26px; font-size:16px; background:linear-gradient(135deg,#3a5fcd,#28408f); color:#fff; box-shadow:none; }
  .row { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }
  .hint { font-size:14px; color:#7e90b5; }
  .coinline { font-size:22px; font-weight:900; color:#ffd54a; }

  /* home extras */
  #home .mascot { font-size:74px; animation:bob 2s ease-in-out infinite; }
  @keyframes bob { 0%,100%{transform:translateY(0) rotate(-3deg)} 50%{transform:translateY(-12px) rotate(3deg)} }
  #daily { pointer-events:auto; display:none; background:linear-gradient(135deg,#ffd54a,#ff8c3d); color:#241600;
    border:none; border-radius:18px; padding:12px 22px; font-size:16px; font-weight:900; cursor:pointer; box-shadow:0 6px 18px rgba(255,170,60,.4); }
  #ach { display:flex; flex-wrap:wrap; gap:7px; justify-content:center; max-width:380px; }
  .badge { font-size:12px; font-weight:800; padding:6px 11px; border-radius:20px; background:rgba(255,255,255,.07); color:#6b7da3; border:1px solid rgba(255,255,255,.08); }
  .badge.on { background:rgba(57,255,136,.16); color:#9effc4; border-color:rgba(57,255,136,.4); }

  /* toast */
  #toast { position:absolute; left:50%; bottom:calc(env(safe-area-inset-bottom) + 26px); transform:translateX(-50%) translateY(40px);
    background:linear-gradient(135deg,#ffd54a,#ff8c3d); color:#241600; font-weight:900; padding:12px 22px; border-radius:30px;
    box-shadow:0 8px 24px rgba(0,0,0,.4); opacity:0; transition:.3s; pointer-events:none; font-size:15px; max-width:88vw; text-align:center; }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  #back { position:absolute; left:14px; bottom:calc(env(safe-area-inset-bottom) + 12px); pointer-events:auto;
    background:rgba(8,12,26,.5); color:#9fb3d8; border:none; border-radius:24px; padding:9px 18px; font-size:14px; font-weight:800; cursor:pointer; z-index:5; }
</style>

<body>
<div id="wrap">
  <canvas id="cv"></canvas>

  <div id="hud" style="display:none">
    <div class="chip">LEVEL <span id="hLvl">1</span></div>
    <div class="chip coins">🪙 <span id="hCoins">0</span></div>
  </div>
  <div id="twistTag" style="display:none"></div>

  <div id="banner"><div class="big" id="bBig"></div><div class="small" id="bSmall"></div></div>

  <!-- HOME -->
  <div id="home" class="ov">
    <div class="mascot">🟡</div>
    <div class="title">ONE MORE<br>TRY</div>
    <div class="lvltxt">Simple to learn. Brutal to master.<br>The rules keep changing. 😈</div>
    <div class="coinline">🪙 <span id="homeCoins">0</span></div>
    <button id="daily">🎁 Claim daily reward +25</button>
    <button class="btn" id="playBtn">▶ PLAY</button>
    <div class="row">
      <button class="btn sm" id="contBtn" style="display:none"></button>
      <button class="btn sm" id="resetBtn">Reset progress</button>
    </div>
    <div class="row">
      <button class="btn sm" id="IGA_login" onclick="window.IGAuth && IGAuth.openAuth()">👤 Log in</button>
      <button class="btn sm" id="IGA_lb" onclick="window.IGAuth && IGAuth.showLeaderboard('try','One More Try')">🏆 Leaderboard</button>
    </div>
    <div id="ach"></div>
    <div class="hint">Tap / Space to act • one mistake = restart</div>
  </div>

  <!-- DEAD -->
  <div id="dead" class="ov">
    <div class="title deadtitle">OOPS!</div>
    <div class="lvltxt" id="deadLvl">Level 1</div>
    <div class="stat" id="deadStat"></div>
    <button class="btn retry" id="retryBtn">🔁 ONE MORE TRY</button>
    <div class="hint">tap anywhere to retry instantly</div>
  </div>

  <!-- WIN -->
  <div id="win" class="ov">
    <div class="title wintitle">CLEARED!</div>
    <div class="lvltxt" id="winLvl">Level 1 done</div>
    <div class="coinline" id="winCoins">+5 🪙</div>
    <div class="stat" id="winStat"></div>
    <button class="btn" id="nextBtn">NEXT ➜</button>
  </div>

  <button id="back" onclick="location.href='../'">← Arcade</button>
  <div id="toast"></div>
</div>

<script>
"use strict";
/* =========================================================================
   ONE MORE TRY — a one-button rage runner where the rules keep changing.
   ========================================================================= */
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');

/* virtual world is VH tall; camera scrolls along x. everything is drawn in
   world units then scaled to fit the screen height. */
const VH = 360;
const FLOOR = 300, CEIL = 60;     // surfaces
let SCALE = 1, VW = 640, DPR = 1; // recomputed on resize
function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2.5);
  const w = window.innerWidth, h = window.innerHeight;
  cv.width = Math.round(w*DPR); cv.height = Math.round(h*DPR);
  SCALE = (h*DPR)/VH;
  VW = cv.width/SCALE;
}
addEventListener('resize', resize); resize();

/* ---------- persistence ---------- */
const SAVE_KEY = 'omt_save_v1';
function loadSave(){
  try{ const s = JSON.parse(localStorage.getItem(SAVE_KEY)); if(s&&typeof s==='object') return Object.assign(def(),s); }catch(e){}
  return def();
  function def(){ return { coins:0, best:1, tries:0, wins:0, daily:'', ach:{} }; }
}
let SV = loadSave();
function save(){ try{ localStorage.setItem(SAVE_KEY, JSON.stringify(SV)); }catch(e){} }

/* ---------- achievements ---------- */
const ACH = [
  {id:'first',  name:'🐣 First Steps',     test:()=>SV.wins>=1},
  {id:'five',   name:'🖐️ High Five',       test:()=>SV.best>5},
  {id:'ten',    name:'🔟 Double Digits',   test:()=>SV.best>10},
  {id:'twenty', name:'🏆 Twenty Club',     test:()=>SV.best>20},
  {id:'coins',  name:'💰 100 Coins',       test:()=>SV.coins>=100},
  {id:'rich',   name:'🤑 500 Coins',       test:()=>SV.coins>=500},
  {id:'try50',  name:'😤 50 Tries',        test:()=>SV.tries>=50},
  {id:'try200', name:'🔥 200 Tries',       test:()=>SV.tries>=200},
  {id:'flip',   name:'🔄 Gravity Master',  test:()=>SV.ach.flip},
  {id:'flaw',   name:'✨ Flawless',         test:()=>SV.ach.flaw},
];
function checkAch(){
  ACH.forEach(a=>{ if(!SV.ach[a.id] && a.test()){ SV.ach[a.id]=true; save(); toast('Achievement: '+a.name); } });
  renderBadges();
}
function renderBadges(){
  document.getElementById('ach').innerHTML = ACH.map(a=>
    `<span class="badge ${SV.ach[a.id]?'on':''}">${a.name}</span>`).join('');
}

/* ---------- tiny seeded RNG (so each level is identical every retry = fair) ---------- */
function rng(seed){ let s = seed>>>0; return ()=>{ s=(s*1664525+1013904223)>>>0; return s/4294967296; }; }

/* ===================================================================
   LEVEL DESIGN — the twist cycle. Every change is announced on screen.
   =================================================================== */
const TWISTS = {
  spikes:    {name:'Jump the spikes',     bg:['#1b3a6b','#0a0e1a'], accent:'#ff5b6e'},
  reverse:   {name:'Gravity flipped!',    bg:['#3a1d5e','#120a22'], accent:'#c77bff', flip:true},
  gaps:      {name:'The floor is gone',   bg:['#0a4f4a','#03201e'], accent:'#39ffd0', gaps:true},
  fast:      {name:'Hyper speed',         bg:['#6b2a00','#1a0a00'], accent:'#ffb04a', fast:true},
  lowgrav:   {name:'Low gravity',         bg:['#0a2a6b','#03102a'], accent:'#7cc0ff', low:true},
  upside:    {name:'Upside down',         bg:['#5e0a3a','#220312'], accent:'#ff7bd0', upside:true},
  fake:      {name:'Fake finish!',        bg:['#4a4a0a','#1a1a03'], accent:'#fff04a', fake:true},
  movers:    {name:'Moving walls',        bg:['#2a2a3e','#0c0c14'], accent:'#9fb3ff', movers:true},
  // ---- new mechanics that start appearing from level 100 ----
  dflip:     {name:'Double flip',         bg:['#3a1d5e','#0c0618'], accent:'#c9a0ff', dflip:true},
  blackout:  {name:'Blackout',            bg:['#101018','#020207'], accent:'#8aa0ff', blackout:true},
  ghost:     {name:'Ghost spikes',        bg:['#22303a','#080e12'], accent:'#a9e6ff', ghost:true},
  fakehz:    {name:'Fake hazard',         bg:['#3a3a12','#12120a'], accent:'#ffe07a', fakehz:true},
  portal:    {name:'Fake portal',         bg:['#0a3a4a','#02141c'], accent:'#5fe0ff', portal:true},
};
/* first levels match the classic order; afterwards twists are stacked & shuffled. */
const ORDER = ['spikes','spikes','reverse','gaps','fast','lowgrav','upside','fake','movers'];
const BASE_POOL = ['spikes','reverse','gaps','fast','lowgrav','upside','fake','movers'];
const NEW_POOL  = ['dflip','blackout','ghost','fakehz','portal'];
const WHEEL = { low:'Low Gravity', fast:'Hyper Speed', dark:'Darkness', heavy:'Heavy Gravity' };

// difficulty tiers the player grows into
function tierConfig(n){
  return {
    combo:  n>=25,                 // two events stacked together
    triple: n>=50,                 // sometimes three spikes
    newMech:n>=100,                // fake hazard, ghost, double flip, blackout, fake portal
    master: n>=200,                // "you've come this far" chaos
    wheel:  n>=200 && n%10===0,    // random event wheel every 10 levels
  };
}
// which twists are active this level (1 early, 2 from L25, 2-4 in master mode)
function pickTwists(n, R, tier){
  if(n<=ORDER.length) return [ORDER[n-1]];
  if(n<25) return [BASE_POOL[(n-1)%BASE_POOL.length]];
  const pool = tier.newMech ? BASE_POOL.concat(NEW_POOL) : BASE_POOL;
  const want = tier.master ? 2 + Math.floor(R()*3) : 2;   // master: 2..4, else exactly 2
  const bag = pool.slice(), picks = [];
  for(let i=0;i<want && bag.length;i++) picks.push(bag.splice(Math.floor(R()*bag.length),1)[0]);
  return picks;
}
// merge several twists' flags into one effective twist
function combineTwists(keys){
  const ps = keys.map(k=>TWISTS[k]), any = f=>ps.some(p=>p[f]);
  return { keys, name: ps.map(p=>p.name).join(' + '), bg:ps[0].bg, accent:ps[0].accent,
    fast:any('fast'), low:any('low'), flip:any('flip'), upside:any('upside'), fake:any('fake'),
    movers:any('movers'), gaps:any('gaps'), dflip:any('dflip'), blackout:any('blackout'),
    ghost:any('ghost'), fakehz:any('fakehz'), portal:any('portal') };
}
// ghost spikes blink solid<->safe as a function of position (deterministic on every retry)
function ghostPhase(f,x){ return (((x*0.5 + f.ph*120) % 220) + 220) % 220; }
function ghostOn(f,x){ return ghostPhase(f,x) < 130; }               // solid ~60% of the cycle
function portalY(f){ return (f.surf>0?FLOOR:CEIL) + (f.surf>0?-1:1)*70; }

/* build a fully-deterministic level layout for level n */
function buildLevel(n){
  const R = rng(n*2654435761 + 12345);
  const tier = tierConfig(n);
  const keys = pickTwists(n, R, tier);
  const tw = combineTwists(keys);

  // random event wheel — master mode, every 10th level, one surprise modifier
  let wheel=null, dark=false, heavy=false;
  if(tier.wheel){
    wheel = ['low','fast','dark','heavy'][Math.floor(R()*4)];
    if(wheel==='low') tw.low=true; else if(wheel==='fast') tw.fast=true;
    else if(wheel==='dark') dark=true; else heavy=true;
  }

  const diff = Math.min(1, (n-1)/26);              // 0..1 difficulty ramp
  let speed = 230 + diff*60 + Math.min(130, Math.max(0,n-50)*0.7);   // creeps up deep into the run
  let g = 2000;
  if(tw.fast) speed *= 1.5;
  if(tw.low)  g = 950;
  if(heavy)   g = 2600;
  const gravSign = tw.flip ? -1 : 1;               // -1 => run on the ceiling
  const jumpV = Math.sqrt(2*g*118);                // ~118u jump height
  const arc = speed * (2*jumpV/g);                 // horizontal reach of one jump — spacing scales with it
  const surf = gravSign>0 ? FLOOR : CEIL;          // surface obstacles sit on
  const dir  = gravSign>0 ? -1 : 1;               // toward open space

  const count = Math.min(13, 5 + Math.floor(diff*7) + (n>=100?2:0) + (n<=2?-1:0));
  const tripleP = tier.triple ? (tier.master?0.30:0.20) : 0;   // chance of three spikes
  const doubleP = diff>0.4 ? 0.30 : 0;                          // chance of two spikes

  const feats = [], coins = [];
  let x = 440;
  const pushSpikes = (x0,k,kind)=>{ for(let s=0;s<k;s++) feats.push({type:kind, x:x0+s*34, surf:gravSign, ph:R()*6.28}); };

  for(let i=0;i<count;i++){
    const space = arc * (1.18 + R()*0.5);
    const roll = R();
    if(tw.gaps && roll<0.4){
      const w = Math.min(arc*0.6, 90 + R()*70);
      feats.push({type:'gap', x, w, surf:gravSign});
      coins.push({x:x+w/2, y:surf + dir*90, got:false});
      x += w + space; continue;
    }
    if(tw.movers && roll>=0.4 && roll<0.6){
      feats.push({type:'mover', x, surf:gravSign, ph:R()*6.28});
      x += space; continue;
    }
    // spike family: single / double / triple, optionally ghosted
    const kind = (tw.ghost && R()<0.5) ? 'ghost' : 'spike';
    const r2 = R();
    const k = r2<tripleP ? 3 : (r2<tripleP+doubleP ? 2 : 1);
    pushSpikes(x, k, kind);
    if(k>1) coins.push({x:x+(k-1)*17, y:surf + dir*125, got:false});
    else if(R()<0.55) coins.push({x, y:surf + dir*110, got:false});
    // fake hazard: a decoy spike a step ahead that fades away at the last second
    if(tw.fakehz && R()<0.45) feats.push({type:'fakespike', x:x+42+R()*20, surf:gravSign});
    x += space * (k>1?1.18:1);
    // occasional coin trio on the flat
    if(R()<0.30){ for(let c2=0;c2<3;c2++) coins.push({x:x - space*0.5 + c2*22, y:surf + dir*46, got:false}); }
  }

  let finishX = x + 160;
  // fake finish: a decoy ribbon partway, with a sneaky spike right after it
  let fakeX = null;
  if(tw.fake){ fakeX = 440 + (finishX-440)*0.58; feats.push({type:'spike', x:fakeX+70, surf:gravSign}); }
  // fake portal: looks like a shortcut you leap into — actually flings you backwards
  if(tw.portal){ const px = 440 + (finishX-440)*(0.4+R()*0.2); feats.push({type:'portal', x:px, surf:gravSign, used:false, back:arc*1.3}); }

  // ---- GUARANTEE THE LEVEL IS BEATABLE ----
  // Inserted obstacles (the fake-finish spike, the fake portal) were placed at a
  // fixed offset, ignoring nearby obstacles — so they could land in the "dead zone"
  // that's too far to land between yet too close to clear in one jump, making a
  // handful of levels impossible (109, 115, 204…). This pass enforces the same
  // proven-safe spacing the generator already uses (1.18·arc leading-edge gap)
  // between every timing-critical feature, nudging the later one right when needed.
  // Fully deterministic, so a level is identical on every retry.
  {
    const SEP = arc*1.18;
    const timing = f => f.type==='spike'||f.type==='ghost'||f.type==='gap'||f.type==='mover'||f.type==='portal';
    const lead = f => f.type==='gap' ? f.x : f.x-16;
    const shiftFrom = (x0,d)=>{ for(const f of feats) if(f.x>x0) f.x+=d; for(const c of coins) if(c.x>x0) c.x+=d; };
    let guard=0;
    for(;;){
      const fs = feats.filter(timing).sort((a,b)=>a.x-b.x);
      let moved=false;
      for(let i=1;i<fs.length;i++){
        const A=fs[i-1], B=fs[i];
        const sameFam=(A.type==='spike'||A.type==='ghost')&&(B.type==='spike'||B.type==='ghost');
        if(sameFam && (B.x-A.x)<=40) continue;          // intended tight spike clusters (doubles/triples)
        if(lead(B)-lead(A) < SEP-0.5){ shiftFrom(B.x-0.01, SEP-(lead(B)-lead(A))); moved=true; break; }
      }
      if(!moved || ++guard>4000) break;
    }
    let maxx=440; for(const f of feats) maxx=Math.max(maxx, f.x+(f.w||0));
    finishX = Math.max(finishX, maxx+160);
  }

  // timed events that fire as the player passes an x
  const events = [];
  if(tw.dflip){ events.push({type:'flip', x:440+(finishX-440)*0.38, dur:2.4, fired:false});
                if(tier.master) events.push({type:'flip', x:440+(finishX-440)*0.72, dur:2.2, fired:false}); }
  if(tw.blackout){ events.push({type:'blackout', x:440+(finishX-440)*0.35, dur:1.4, fired:false});
                   if(tier.master) events.push({type:'blackout', x:440+(finishX-440)*0.68, dur:1.4, fired:false}); }

  return { n, keys, tk:keys[0], tw, tier, wheel, dark, speed, g, jumpV, gravSign, surf, dir,
           feats, coins, finishX, fakeX, events, flipT:0, blackoutT:0, blackoutDur:0 };
}

/* ===================================================================
   GAME STATE
   =================================================================== */
let L = null;            // current level layout
let state = 'home';      // home | play | dead | win
// parts/shake/bannerT are touched by the animation loop on the home screen too,
// so they must be initialised before the first frame (not only in startLevel).
let parts = [], shake = 0, bannerT = 0, cam = 0;
let player, flawless, started, deathT, winT;

function startLevel(n){
  L = buildLevel(n);
  const restY = L.gravSign>0 ? FLOOR - 16 : CEIL + 16;
  player = { x:120, y:restY, vy:0, r:15, onSurf:true, rot:0, sx:1, sy:1, coins:0, dead:false };
  cam = 0;
  parts = [];
  shake = 0;
  flawless = true; started = false; deathT = 0; winT = 0;
  state = 'play';
  showOnly('hud');
  document.getElementById('twistTag').style.display='block';
  document.getElementById('twistTag').textContent = (L.tier.master?'🔥 ':'⚡ ') + L.tw.name + (L.wheel?(' • 🎡 '+WHEEL[L.wheel]):'');
  document.getElementById('hLvl').textContent = n;
  document.getElementById('hCoins').textContent = SV.coins;
  bannerT = 1.5;
  showBanner((L.tier.master?'MASTER ':'LEVEL ')+n, L.tw.name.toUpperCase());
  if(L.wheel) setTimeout(()=>{ if(state==='play' && L && L.n===n) toast('🎡 Event Wheel: '+WHEEL[L.wheel]); }, 750);
}

function jump(){
  if(state==='dead'){ retry(); return; }
  if(state==='win'){ next(); return; }
  if(state!=='play') return;
  started = true;
  if(player.onSurf){
    player.vy = -L.gravSign * L.jumpV;
    player.onSurf = false;
    burst(player.x, player.y + L.gravSign*16, L.tw.accent, 7, 1);
    player.sy = 1.4; player.sx = 0.7;
  }
}

function die(reason){
  if(player.dead) return;
  player.dead = true; deathT = 0; state='dead';
  shake = 16;
  burst(player.x, player.y, '#ff5b6e', 26, 2.4);
  SV.tries++; save();
  showDeadOverlay();
  checkAch();
}

function reachFinish(){
  state='win'; winT=0;
  const bonus = 4 + L.n; // completion coins
  player.coins += bonus;
  SV.coins += bonus; SV.wins++;
  if(L.n+1 > SV.best) SV.best = L.n+1;
  if(window.IGAuth) IGAuth.submitScore('try', SV.best);
  if(flawless){ SV.ach.flaw = true; }
  if(L.tw.flip){ SV.ach.flip = true; }
  save();
  burst(player.x, player.y, '#39ff88', 30, 2.4);
  showWinOverlay(bonus);
  checkAch();
}

/* ---------- particles ---------- */
function burst(x,y,color,n,pw){
  for(let i=0;i<n;i++){
    const a = Math.random()*6.28, sp = (1+Math.random()*3)*pw;
    parts.push({x,y, vx:Math.cos(a)*sp*60, vy:Math.sin(a)*sp*60 - 40, life:0.5+Math.random()*0.4, t:0, color, r:2+Math.random()*3});
  }
}

/* ===================================================================
   PHYSICS / UPDATE
   =================================================================== */
let last = performance.now();
function frame(now){
  let dt = (now-last)/1000; last = now;
  if(dt>0.05) dt = 0.05;            // clamp after tab switch
  update(dt);
  render();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

function update(dt){
  // particles always run (nice on menus too)
  for(const p of parts){ p.t+=dt; p.vy += 600*dt; p.x += p.vx*dt; p.y += p.vy*dt; }
  parts = parts.filter(p=>p.t<p.life);
  if(shake>0) shake = Math.max(0, shake - dt*60);
  if(bannerT>0) bannerT -= dt;

  if(state==='dead'){ deathT+=dt; return; }
  if(state==='win'){ winT+=dt; return; }
  if(state!=='play') return;

  if(deathT) return;

  // the run auto-starts a beat after the level banner, so every tap is a real
  // jump and the player always gets a clean run-up to read the first obstacle.
  if(!started && bannerT <= 0.9) started = true;

  // gravity + integrate (nothing moves or falls during the intro beat)
  if(started){
    // timed events fire as we pass their trigger x (double flip / blackout)
    for(const ev of L.events){
      if(!ev.fired && player.x>=ev.x){ ev.fired=true;
        if(ev.type==='flip') L.flipT=ev.dur; else if(ev.type==='blackout'){ L.blackoutT=ev.dur; L.blackoutDur=ev.dur; }
        shake=Math.max(shake,7);
      }
    }
    if(L.flipT>0) L.flipT = Math.max(0, L.flipT - dt);
    let spd = L.speed;
    if(L.blackoutT>0) L.blackoutT = Math.max(0, L.blackoutT - dt);   // blackout only dims the screen — speed is untouched
    player.x += spd*dt;
    player.vy += L.g * L.gravSign * dt;
    player.y  += player.vy*dt;
  }

  // squash/stretch easing back to normal
  player.sx += (1-player.sx)*Math.min(1,dt*12);
  player.sy += (1-player.sy)*Math.min(1,dt*12);
  player.rot += (player.onSurf?0:L.gravSign* -7*dt);

  // surface rest / gap detection
  const restY = L.gravSign>0 ? FLOOR - player.r : CEIL + player.r;
  const overGap = gapAt(player.x);
  if(L.gravSign>0){
    if(player.y >= restY && !overGap){
      if(!player.onSurf){ landFx(); }
      player.y = restY; player.vy = 0; player.onSurf = true; player.rot=0;
    } else player.onSurf = false;
    if(player.y > VH + 60) return die('fell');
  } else {
    if(player.y <= restY && !overGap){
      if(!player.onSurf){ landFx(); }
      player.y = restY; player.vy = 0; player.onSurf = true; player.rot=0;
    } else player.onSurf = false;
    if(player.y < -60) return die('fell');
  }

  // spike / mover / ghost / portal collisions
  for(const f of L.feats){
    if(Math.abs(f.x - player.x) > 150) continue;
    if(f.type==='spike'){
      if(spikeHit(f, player)) return die('spike');
    } else if(f.type==='ghost'){
      if(ghostOn(f, player.x) && spikeHit(f, player)) return die('spike');   // only solid while "on"
    } else if(f.type==='fakespike'){
      /* harmless decoy — never collides (it fades away as you reach it) */
    } else if(f.type==='mover'){
      const m = moverRect(f);
      if(circleRect(player.x,player.y,player.r-2, m.x,m.y,m.w,m.h)) return die('wall');
    } else if(f.type==='portal'){
      if(!f.used && Math.hypot(f.x-player.x, portalY(f)-player.y) < player.r+22){
        f.used=true;                                    // "shortcut" that flings you back
        player.x = Math.max(140, player.x - f.back);
        player.y = L.gravSign>0 ? FLOOR-player.r : CEIL+player.r; player.vy=0; player.onSurf=true;
        cam = Math.max(0, player.x - VW*0.30);
        burst(f.x, portalY(f), '#5fe0ff', 26, 2.2); shake = Math.max(shake, 10);
      }
    }
  }

  // coins
  for(const c of L.coins){
    if(c.got) continue;
    if(Math.hypot(c.x-player.x, c.y-player.y) < player.r+13){
      c.got=true; player.coins++; SV.coins++; save();
      document.getElementById('hCoins').textContent = SV.coins;
      burst(c.x,c.y,'#ffd54a',8,1.2);
    }
  }

  // finish
  if(player.x >= L.finishX) return reachFinish();

  // camera follows, keeping player ~32% from left
  cam = player.x - VW*0.30;
  if(cam<0) cam=0;
}

function landFx(){ burst(player.x, player.y + L.gravSign*16, '#ffffff', 5, 0.8); player.sx=1.35; player.sy=0.7; }

function gapAt(x){
  for(const f of L.feats){ if(f.type==='gap' && x>f.x && x<f.x+f.w) return true; }
  return false;
}
function spikeHit(f, p){
  const surfY = f.surf>0 ? FLOOR : CEIL;
  const h = 44, hw = 16;            // forgiving hitbox (visual triangle is a touch bigger)
  const top = f.surf>0 ? surfY-h : surfY;
  return circleRect(p.x,p.y,p.r-3, f.x-hw, top, hw*2, h);
}
function moverRect(f){
  // phase is driven by progress so the wall is deterministic on every retry.
  // geometry is tuned so a grounded player and a jumping player are NEVER both
  // blocked at once: read the wall and choose to hop or hold.
  const t = (player.x + f.ph*60)/120;
  const cy = 200 + Math.sin(t)*50;               // centre swings in [150,250]
  return { x:f.x-16, y:cy-32, w:32, h:64 };       // ground(270+) clear when high; arc(<182) clear when low
}
function circleRect(cx,cy,r, rx,ry,rw,rh){
  const nx = Math.max(rx, Math.min(cx, rx+rw));
  const ny = Math.max(ry, Math.min(cy, ry+rh));
  return (cx-nx)**2 + (cy-ny)**2 < r*r;
}

/* ===================================================================
   RENDER
   =================================================================== */
function render(){
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,cv.width,cv.height);

  const tw = (state==='play'||state==='dead'||state==='win') && L ? L.tw : TWISTS.spikes;

  // background gradient
  const grd = ctx.createLinearGradient(0,0,0,cv.height);
  grd.addColorStop(0, tw.bg[0]); grd.addColorStop(1, tw.bg[1]);
  ctx.fillStyle = grd; ctx.fillRect(0,0,cv.width,cv.height);

  if(state==='home'){ renderHomeBg(); return; }
  if(!L) return;

  ctx.save();
  // upside-down twist rotates the world 180°; a "double flip" event XORs it for a few seconds
  const upsideNow = !!tw.upside !== (!!L && L.flipT>0);
  if(upsideNow){ ctx.translate(cv.width/2, cv.height/2); ctx.rotate(Math.PI); ctx.translate(-cv.width/2,-cv.height/2); }
  // world -> screen scale, with camera & screenshake
  const sh = shake>0 ? (Math.random()-0.5)*shake : 0;
  ctx.scale(SCALE, SCALE);
  ctx.translate(-cam + sh*0.3, sh*0.3);

  drawParallax(tw);
  drawSurfaces(tw);
  drawFinish(tw);
  drawFeatures(tw);
  drawCoins();
  drawPlayer(tw);
  drawParticlesWorld();

  ctx.restore();

  // darkness wheel modifier — a vignette closes in around the action
  if(L && L.dark && (state==='play'||state==='dead')){
    ctx.setTransform(1,0,0,1,0,0);
    const g = ctx.createRadialGradient(cv.width*0.42,cv.height*0.52,cv.height*0.10, cv.width*0.42,cv.height*0.52,cv.height*0.80);
    g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(1,'rgba(0,0,0,0.9)');
    ctx.fillStyle=g; ctx.fillRect(0,0,cv.width,cv.height);
  }
  // blackout pulse — a brief dim that fades in and out (spikes stay visible; no speed change)
  if(L && L.blackoutT>0 && (state==='play'||state==='dead')){
    const RAMP = 0.5, elapsed = (L.blackoutDur||1.4) - L.blackoutT;
    const env = Math.min(1, elapsed/RAMP, L.blackoutT/RAMP);   // 0→1→0 smooth fade
    ctx.setTransform(1,0,0,1,0,0);
    ctx.fillStyle = 'rgba(2,2,10,'+(0.62*env).toFixed(3)+')';
    ctx.fillRect(0,0,cv.width,cv.height);
  }
  // live event indicator (blackout / flip)
  if(state==='play' && L){
    const msg = L.blackoutT>0 ? '🌑 BLACKOUT' : (L.flipT>0 ? '🔄 FLIP!' : null);
    if(msg){
      ctx.setTransform(1,0,0,1,0,0); ctx.textAlign='center'; ctx.font='900 '+Math.round(20*DPR)+'px Trebuchet MS';
      ctx.fillStyle='rgba(0,0,0,.45)'; ctx.fillText(msg, cv.width/2+2, cv.height*0.30+2);
      ctx.fillStyle='#ffe07a';         ctx.fillText(msg, cv.width/2,   cv.height*0.30);
    }
  }
}

function drawParallax(tw){
  // soft drifting blobs for depth
  ctx.globalAlpha = 0.12;
  for(let i=0;i<6;i++){
    const bx = ((i*220) - (cam*0.3) % 1320 + 1320)%1320 - 60;
    ctx.fillStyle = tw.accent;
    ctx.beginPath(); ctx.arc(bx, 80 + (i%3)*70, 60, 0, 6.28); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawSurfaces(tw){
  // draw floor and ceiling as thick bars, with gaps punched out of the active surface
  const drawBar = (sign)=>{
    const surfY = sign>0 ? FLOOR : CEIL;
    const y = sign>0 ? surfY : surfY-26;
    const segs = [[cam-40, cam+VW+80]];
    // punch gaps that belong to this surface
    const gaps = L.feats.filter(f=>f.type==='gap' && f.surf===sign);
    let pieces = [[cam-40, cam+VW+80]];
    for(const gp of gaps){
      const np=[];
      for(const [a,b] of pieces){
        if(gp.x>b || gp.x+gp.w<a){ np.push([a,b]); continue; }
        if(gp.x>a) np.push([a, gp.x]);
        if(gp.x+gp.w<b) np.push([gp.x+gp.w, b]);
      }
      pieces = np;
    }
    ctx.fillStyle = tw.accent;
    for(const [a,b] of pieces){
      ctx.globalAlpha = 0.9;
      roundRect(a, y, b-a, 26, 6); ctx.fill();
    }
    ctx.globalAlpha = 1;
    // grid lines for motion feel
    ctx.strokeStyle = 'rgba(255,255,255,.18)'; ctx.lineWidth=2;
    for(const [a,b] of pieces){
      for(let gx=Math.ceil(a/40)*40; gx<b; gx+=40){
        ctx.beginPath(); ctx.moveTo(gx,y); ctx.lineTo(gx,y+26); ctx.stroke();
      }
    }
  };
  drawBar(1);
  // only draw the ceiling bar prominently when it's the active (flipped) surface
  if(L.gravSign<0) drawBar(-1);
  else { ctx.globalAlpha=0.2; const surfY=CEIL; ctx.fillStyle=tw.accent; ctx.fillRect(cam-40,surfY-26,VW+80,26); ctx.globalAlpha=1; }
}

function drawFinish(tw){
  const drawRibbon = (fx, fake)=>{
    const surfY = L.gravSign>0?FLOOR:CEIL;
    const top = L.gravSign>0?CEIL:CEIL, bot=FLOOR;
    // checkered pole
    ctx.fillStyle = fake? 'rgba(255,240,74,.9)' : '#fff';
    ctx.fillRect(fx-3, CEIL-26, 6, FLOOR-CEIL+26);
    const sz=12;
    for(let yy=CEIL-20; yy<FLOOR; yy+=sz){
      for(let xi=0; xi<2; xi++){
        const on = (((yy/sz|0)+xi)&1)===0;
        ctx.fillStyle = on? (fake?'#ffd54a':'#111') : (fake?'#fff04a':'#fff');
        ctx.fillRect(fx+4+xi*sz, yy, sz, sz);
      }
    }
    if(fake){
      ctx.fillStyle='#fff04a'; ctx.font='bold 15px Trebuchet MS'; ctx.textAlign='center';
      ctx.fillText('FINISH?', fx+16, CEIL-32);
    }
  };
  if(L.fakeX!=null) drawRibbon(L.fakeX, true);
  drawRibbon(L.finishX, false);
}

function drawSpike(f, col, alpha){
  const surfY = f.surf>0?FLOOR:CEIL, h=50, hw=20;
  ctx.globalAlpha = alpha;
  ctx.fillStyle = col;
  ctx.beginPath();
  if(f.surf>0){ ctx.moveTo(f.x-hw,surfY); ctx.lineTo(f.x,surfY-h); ctx.lineTo(f.x+hw,surfY); }
  else { ctx.moveTo(f.x-hw,surfY); ctx.lineTo(f.x,surfY+h); ctx.lineTo(f.x+hw,surfY); }
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,'+(0.35*alpha)+')';
  ctx.beginPath();
  if(f.surf>0){ ctx.moveTo(f.x-hw,surfY); ctx.lineTo(f.x,surfY-h); ctx.lineTo(f.x-hw*0.3,surfY); }
  else { ctx.moveTo(f.x-hw,surfY); ctx.lineTo(f.x,surfY+h); ctx.lineTo(f.x-hw*0.3,surfY); }
  ctx.closePath(); ctx.fill();
  ctx.globalAlpha = 1;
}
function drawPortal(f){
  const y = portalY(f), t = last*0.005;
  ctx.save(); ctx.translate(f.x, y);
  for(let r=0;r<3;r++){ ctx.globalAlpha = f.used?0.14:(0.55-r*0.13); ctx.strokeStyle='#5fe0ff'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.ellipse(0,0,20-r*4,26-r*5, t+r, 0,6.28); ctx.stroke(); }
  ctx.globalAlpha = f.used?0.1:0.85; ctx.fillStyle='rgba(95,224,255,.28)';
  ctx.beginPath(); ctx.arc(0,0,12,0,6.28); ctx.fill();
  ctx.globalAlpha = 1; ctx.restore();
}
function drawFeatures(tw){
  const px = player ? player.x : cam;
  for(const f of L.feats){
    if(f.x < cam-60 || f.x > cam+VW+60) continue;
    if(f.type==='spike'){
      drawSpike(f, '#ff5b6e', 1);
    } else if(f.type==='ghost'){
      const on = ghostOn(f, px);
      drawSpike(f, '#a9e6ff', on?0.92:0.16);          // blinks solid <-> faint
    } else if(f.type==='fakespike'){
      const d = Math.abs(f.x - px);
      const a = Math.max(0, Math.min(1, (d-45)/45));  // fades out as you reach it, then it's gone
      if(a>0.03) drawSpike(f, '#ff7b8e', a);
    } else if(f.type==='mover'){
      const m = moverRect(f);
      ctx.fillStyle = '#9fb3ff';
      roundRect(m.x,m.y,m.w,m.h,6); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.25)';
      roundRect(m.x+4,m.y+4,m.w-8,10,4); ctx.fill();
    } else if(f.type==='portal'){
      drawPortal(f);
    }
  }
}

function drawCoins(){
  for(const c of L.coins){
    if(c.got) continue;
    if(c.x<cam-40||c.x>cam+VW+40) continue;
    const bob = Math.sin(c.x*0.05 + last*0.005)*3;
    ctx.save(); ctx.translate(c.x, c.y+bob);
    const sq = Math.abs(Math.cos(last*0.004 + c.x));   // spin
    ctx.scale(0.4+sq*0.6, 1);
    ctx.fillStyle='#ffd54a'; ctx.beginPath(); ctx.arc(0,0,11,0,6.28); ctx.fill();
    ctx.fillStyle='#b8860b'; ctx.beginPath(); ctx.arc(0,0,6,0,6.28); ctx.fill();
    ctx.restore();
  }
}

function drawPlayer(tw){
  const p = player;
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(p.rot);
  ctx.scale(p.sx, p.sy);
  // body
  const col = p.dead ? '#ff5b6e' : '#ffe04a';
  ctx.fillStyle='rgba(0,0,0,.25)';
  ctx.beginPath(); ctx.ellipse(0, p.r+ (L.gravSign>0?6:-6), p.r*0.9, 4, 0,0,6.28); ctx.fill();
  ctx.fillStyle = col;
  roundRect(-p.r,-p.r,p.r*2,p.r*2,7); ctx.fill();
  // eyes
  if(!p.dead){
    ctx.fillStyle='#222';
    ctx.beginPath(); ctx.arc(-4,-3,3,0,6.28); ctx.arc(6,-3,3,0,6.28); ctx.fill();
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(-5,-4,1.1,0,6.28); ctx.arc(5,-4,1.1,0,6.28); ctx.fill();
  } else {
    ctx.strokeStyle='#222'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(-7,-6); ctx.lineTo(-1,0); ctx.moveTo(-1,-6); ctx.lineTo(-7,0);
    ctx.moveTo(3,-6); ctx.lineTo(9,0); ctx.moveTo(9,-6); ctx.lineTo(3,0); ctx.stroke();
  }
  ctx.restore();
}

function drawParticlesWorld(){
  for(const p of parts){
    ctx.globalAlpha = Math.max(0,1-p.t/p.life);
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,6.28); ctx.fill();
  }
  ctx.globalAlpha=1;
}

function renderHomeBg(){
  ctx.save(); ctx.scale(SCALE,SCALE);
  for(const p of parts){
    ctx.globalAlpha = Math.max(0,1-p.t/p.life);
    ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x/SCALE,p.y/SCALE,p.r,0,6.28); ctx.fill();
  }
  ctx.globalAlpha=1; ctx.restore();
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}

/* ===================================================================
   SOCIAL STATS — the "87% reached farther than you" hook (illustrative)
   =================================================================== */
function deadMessage(){
  const n = L.n;
  const prog = Math.max(0, Math.min(1, (player.x-120)/(L.finishX-120)));
  // believable "beat this level" rarity, shrinking as levels climb
  const beat = Math.max(2, Math.round(78*Math.exp(-n/6) + (Math.random()*6-3)));
  if(prog < 0.25){
    const ahead = 60 + Math.floor(Math.random()*30);
    return `😬 <b>${ahead}%</b> of players got farther than that.`;
  }
  if(prog > 0.8){
    return `🔥 So close! Only <b>${beat}%</b> of players beat Level ${n}.`;
  }
  const farther = Math.round(prog*100*(0.75+Math.random()*0.2));
  return `You beat <b>${farther}%</b> of players on Level ${n}. Just one more try…`;
}
function winMessage(){
  const beat = Math.max(2, Math.round(78*Math.exp(-L.n/6)));
  return `🏅 Only <b>${beat}%</b> of players cleared Level ${L.n}. You're one of them!`;
}

/* ===================================================================
   UI plumbing
   =================================================================== */
function showOnly(...ids){
  ['home','dead','win'].forEach(id=>document.getElementById(id).classList.toggle('show', ids.includes(id)));
  document.getElementById('hud').style.display = ids.includes('hud') ? 'flex':'none';
  if(!ids.includes('hud')) document.getElementById('twistTag').style.display='none';
}
function showBanner(big, small){
  document.getElementById('bBig').textContent = big;
  document.getElementById('bSmall').textContent = small;
  const b = document.getElementById('banner'); b.classList.remove('show'); void b.offsetWidth; b.classList.add('show');
}
function showDeadOverlay(){
  document.getElementById('deadLvl').textContent = 'Level '+L.n+' • '+L.tw.name;
  document.getElementById('deadStat').innerHTML = deadMessage();
  showOnly('dead');
}
function showWinOverlay(bonus){
  document.getElementById('winLvl').textContent = 'Level '+L.n+' cleared!';
  document.getElementById('winCoins').textContent = '+'+bonus+' 🪙  (total '+SV.coins+')';
  document.getElementById('winStat').innerHTML = winMessage();
  document.getElementById('nextBtn').textContent = 'LEVEL '+(L.n+1)+' ➜';
  showOnly('win');
}

let toastT=null;
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'), 2400);
}

function retry(){ startLevel(L.n); }
function next(){ startLevel(L.n+1); }

  document.getElementById('homeCoins').textContent = SV.coins;
  document.getElementById('twistTag').style.display='none';

  else cb.style.display='none';

  const d = document.getElementById('daily');

/* ---------- input ---------- */
function onTap(e){
  if(state==='home') return;        // home uses buttons
  e.preventDefault();
  jump();
}
cv.addEventListener('pointerdown', onTap, {passive:false});
addEventListener('keydown', e=>{
  if(e.code==='Space'||e.code==='ArrowUp'){ e.preventDefault();
    if(state==='home') document.getElementById('playBtn').click(); else jump();
  }
});
// also allow tapping the dead/win overlays (not the buttons) to advance fast
document.getElementById('dead').addEventListener('pointerdown', e=>{ if(e.target.classList.contains('ov')) retry(); });
document.getElementById('win').addEventListener('pointerdown', e=>{ if(e.target.classList.contains('ov')) next(); });

document.getElementById('playBtn').onclick = ()=> startLevel(SV.best>1?SV.best:1);
document.getElementById('contBtn').onclick = ()=> startLevel(SV.best);
document.getElementById('retryBtn').onclick = retry;
document.getElementById('nextBtn').onclick = next;
document.getElementById('resetBtn').onclick = ()=>{ if(confirm('Reset all coins, levels and achievements?')){ SV=loadSave(); SV={coins:0,best:1,tries:0,wins:0,daily:'',ach:{}}; save(); showHome(); toast('Progress reset'); } };
document.getElementById('daily').onclick = ()=>{
  const today=new Date().toISOString().slice(0,10);
  if(SV.daily===today) return;
  SV.daily=today; SV.coins+=25; save();
  document.getElementById('homeCoins').textContent=SV.coins;
  document.getElementById('daily').style.display='none';
  toast('🎁 +25 coins! Come back tomorrow.');
  checkAch();
};

// little ambient sparkle on the home screen
setInterval(()=>{ if(state==='home'){ parts.push({x:Math.random()*cv.width, y:cv.height, vx:(Math.random()-.5)*30, vy:-60-Math.random()*60, life:2, t:0, color:['#ffd54a','#ff7b3d','#39ff88','#7cc0ff'][Math.floor(Math.random()*4)], r:2+Math.random()*2}); } }, 180);

showHome();
checkAch();
</script>
