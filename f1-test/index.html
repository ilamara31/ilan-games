<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Grand Prix Career — TEST</title>
<meta name="theme-color" content="#0a0e1a" />
<link rel="apple-touch-icon" href="../icon-180.png" />
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; background:#0a0e1a; overflow:hidden; color:#fff;
    font-family:'Trebuchet MS','Segoe UI',sans-serif; user-select:none; -webkit-user-select:none; }
  #wrap { position:relative; width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; }
  canvas { display:block; touch-action:none; }
  #hud { position:absolute; top:0; left:0; right:0; display:flex; justify-content:space-between; align-items:flex-start;
    padding:12px 16px; font-size:15px; pointer-events:none; z-index:5; }
  .box { background:rgba(8,14,28,.66); padding:8px 14px; border-radius:10px; line-height:1.45; }
  .box b { color:#ffd54a; }
  #speedo { text-align:right; }
  #speedo .kmh { font-size:26px; font-weight:900; color:#39ff88; }
  .screen { position:absolute; inset:0; z-index:10; display:flex; flex-direction:column; align-items:center;
    justify-content:flex-start; text-align:center; padding:20px 18px 30px; overflow-y:auto;
    background:radial-gradient(circle at 50% 25%, #18305a, #0a0e1a 78%); }
  .hidden { display:none !important; }
  h1 { font-size:clamp(26px,7vw,46px); letter-spacing:1px; margin:6px 0;
    background:linear-gradient(90deg,#ff9933,#ffffff 50%,#138808); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .sub { color:#9fb3d8; margin-bottom:10px; font-size:clamp(13px,3vw,16px); max-width:520px; }
  .btn { background:linear-gradient(135deg,#ffd54a,#ff8c3d); color:#1a1300; border:none; padding:12px 26px; font-size:16px;
    font-weight:bold; border-radius:28px; cursor:pointer; margin:6px; box-shadow:0 6px 18px rgba(255,160,50,.35); text-decoration:none; display:inline-block; }
  .btn.alt { background:linear-gradient(135deg,#3a5fcd,#28408f); color:#fff; }
  .btn.green { background:linear-gradient(135deg,#39ff88,#1ea85a); color:#04220f; }
  .btn:disabled { opacity:.45; cursor:not-allowed; }
  #wallet { background:rgba(8,14,28,.6); border:1px solid #2a3c63; border-radius:14px; padding:10px 16px; margin:6px 0 14px;
    font-size:16px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; justify-content:center; }
  #wallet b { color:#ffd54a; }
  .list { max-width:520px; width:100%; display:flex; flex-direction:column; gap:10px; }
  .item { display:flex; align-items:center; gap:12px; background:#16243f; border:1px solid #213254; border-radius:14px; padding:12px 14px; text-align:left; }
  .item .ic { font-size:30px; width:40px; text-align:center; }
  .item .info { flex:1; }
  .item .info .t { font-weight:bold; font-size:17px; }
  .item .info .d { color:#9fb3d8; font-size:13px; margin-top:2px; }
  .item .act { display:flex; flex-direction:column; gap:6px; align-items:flex-end; }
  .pill { font-size:12px; color:#04220f; background:#39ff88; border-radius:20px; padding:3px 10px; font-weight:bold; }
  #lights { position:absolute; top:15%; left:50%; transform:translateX(-50%); z-index:8; display:none;
    flex-direction:column; align-items:center; gap:12px; pointer-events:none; }
  #lights .lamps { display:flex; gap:16px; background:#0c0c0c; padding:16px 20px; border-radius:16px; border:2px solid #222; box-shadow:0 10px 34px rgba(0,0,0,.6); }
  #lights .lamp { width:clamp(34px,9vw,52px); height:clamp(34px,9vw,52px); border-radius:50%; background:#2a2a2a; opacity:.4; }
  #lights .lamp.on { opacity:1; }
  #lampR.on { background:#ff2b2b; box-shadow:0 0 26px #ff2b2b; }
  #lampY.on { background:#ffd21f; box-shadow:0 0 26px #ffd21f; }
  #lampG.on { background:#27e36a; box-shadow:0 0 26px #27e36a; }
  #lightsTxt { font-size:clamp(22px,6vw,34px); font-weight:900; text-shadow:0 3px 14px rgba(0,0,0,.6); }
  #homeBtn { position:absolute; bottom:14px; left:14px; z-index:6; font-size:22px; width:46px; height:46px; border-radius:50%;
    background:rgba(255,255,255,.75); color:#111; display:flex; align-items:center; justify-content:center; text-decoration:none; box-shadow:0 2px 6px rgba(0,0,0,.3); }
  .steerhint { position:absolute; bottom:16px; left:50%; transform:translateX(-50%); z-index:6; color:#9fb3d8; font-size:12px;
    background:rgba(8,14,28,.6); padding:6px 14px; border-radius:20px; pointer-events:none; }
  .badge { position:absolute; top:8px; left:50%; transform:translateX(-50%); z-index:11; background:#ff8c3d; color:#1a1300;
    font-size:11px; font-weight:bold; padding:3px 12px; border-radius:0 0 12px 12px; }
  .board { max-width:460px; width:100%; text-align:left; }
  .brow { display:flex; align-items:center; justify-content:space-between; padding:7px 12px; border-radius:8px; margin:3px 0; background:#16243f; font-size:15px; }
  .brow.me { background:rgba(255,213,74,.18); }
  .brow .pos { width:26px; color:#ffd54a; font-weight:bold; }
</style>
</head>
<body>
<div id="wrap">
  <div class="badge">TEST BUILD — not in the app yet</div>
  <canvas id="game"></canvas>

  <div id="hud" class="hidden">
    <div class="box" id="hud-left"></div>
    <div class="box" id="speedo"></div>
  </div>
  <div id="lights">
    <div class="lamps"><div class="lamp" id="lampR"></div><div class="lamp" id="lampY"></div><div class="lamp" id="lampG"></div></div>
    <div id="lightsTxt"></div>
  </div>
  <div class="steerhint hidden" id="steerhint">Hold LEFT / RIGHT side to steer • brake = ↓ / bottom</div>
  <a id="homeBtn" href="../" title="Back to games">🏠</a>

  <!-- MENU -->
  <div id="scr-menu" class="screen">
    <h1>🏁 GRAND PRIX CAREER</h1>
    <div class="sub">Win races, earn ₹, buy faster cars. Pick a circuit to race.</div>
    <div id="wallet"></div>
    <div id="locList" class="list"></div>
    <a class="btn alt" href="../" style="margin-top:14px">🏠 ALL GAMES</a>
  </div>

  <!-- SHOP -->
  <div id="scr-shop" class="screen hidden">
    <h1>🛒 GARAGE</h1>
    <div class="sub">Buy a faster car — higher top speed makes overtaking easy.</div>
    <div id="shopWallet" class="sub" style="color:#ffd54a;font-weight:bold"></div>
    <div id="carList" class="list"></div>
    <button class="btn alt" id="shopBack" style="margin-top:14px">⬅ BACK TO RACES</button>
  </div>

  <!-- FINISH -->
  <div id="scr-finish" class="screen hidden">
    <h1 id="finTitle">FINISH</h1>
    <div class="sub" id="finSub"></div>
    <div id="finBoard" class="board"></div>
    <div class="row" style="margin-top:12px">
      <button class="btn" id="againBtn">RACE AGAIN</button>
      <button class="btn alt" id="menuBtn">MENU</button>
    </div>
  </div>
</div>

<script>
/* ============================================================
   GRAND PRIX CAREER — pseudo-3D F1 racer (TEST build)
   ============================================================ */
const cv=document.getElementById('game'), ctx=cv.getContext('2d');
let W=0,H=0;
function resize(){ W=cv.width=Math.min(window.innerWidth,1000); H=cv.height=window.innerHeight; }
window.addEventListener('resize',resize); resize();

/* ---- career data (isolated test storage) ---- */
const CAREER_KEY='f1career_test_v1';
function loadCareer(){ try{ const c=JSON.parse(localStorage.getItem(CAREER_KEY)); if(c&&c.owned) return c; }catch(e){}
  return { money:300, owned:['kart'], car:'kart' }; }
function saveCareer(){ try{ localStorage.setItem(CAREER_KEY, JSON.stringify(career)); }catch(e){} }
let career=loadCareer();

/* ---- cars (buyable) ---- */
const CARS=[
  {id:'kart',  name:'Starter Kart', top:330, price:0,    color:'#e10600'},
  {id:'turbo', name:'Turbo GT',     top:360, price:400,  color:'#1e90ff'},
  {id:'speed', name:'Speedster',    top:390, price:900,  color:'#39ff88'},
  {id:'hyper', name:'Hyper X',      top:430, price:1800, color:'#ffd21f'},
  {id:'apex',  name:'Apex Pro',     top:470, price:3500, color:'#b14bff'},
];
function getCar(id){ return CARS.find(c=>c.id===id)||CARS[0]; }

/* ---- circuits ---- */
const LOCS=[
  {id:'india',  name:'India',   flag:'🇮🇳', fee:100,  win:200,  theme:{sky:['#2f6fb8','#cfe6ff'], gA:'#11a52b', gB:'#0c9325', hill:'#5aa05a'}},
  {id:'england',name:'England', flag:'🏴', fee:300,  win:600,  theme:{sky:['#5b6b80','#c3ccd6'], gA:'#2e7d4f', gB:'#256b42', hill:'#4f7a5a'}},
  {id:'dubai',  name:'Dubai',   flag:'🇦🇪', fee:600,  win:1200, theme:{sky:['#ffb35c','#ffe6c2'], gA:'#d9b36b', gB:'#c79e57', hill:'#caa45e'}},
  {id:'usa',    name:'USA',     flag:'🇺🇸', fee:1000, win:2000, theme:{sky:['#3a4f9b','#cdd6ff'], gA:'#1f8a3b', gB:'#188031', hill:'#4f8a5a'}},
  {id:'canada', name:'Canada',  flag:'🇨🇦', fee:1500, win:3000, theme:{sky:['#9fc0e8','#eef6ff'], gA:'#e7eef5', gB:'#d6e2ee', hill:'#bcd0e0'}},
];
const PRIZE_FACTOR=[1,0.7,0.5,0.35,0.25,0.18,0.12,0.08];

/* ---- driver opponents ---- */
const DRIVERS=[
  {name:'Verstappen',c:'#1736a8'},{name:'Norris',c:'#ff8000'},{name:'Leclerc',c:'#e8002d'},
  {name:'Piastri',c:'#ff8000'},{name:'Hamilton',c:'#27f4d2'},{name:'Russell',c:'#27f4d2'},{name:'Alonso',c:'#229971'},
];
const LAPS_TOTAL=3;

/* ---- pseudo-3D constants ---- */
const segmentLength=200, rumbleLength=3, roadWidth=3000;
const cameraHeight=1500, fov=100, drawDistance=200, centrifugal=0.3;
const cameraDepth=1/Math.tan((fov/2)*Math.PI/180);
const playerZ=cameraHeight*cameraDepth;
const BASE_MAX=segmentLength*60;           // ~330 km/h reference
let maxSpeed=BASE_MAX;                      // set from chosen car each race

const COL={
  LIGHT:{road:'#6f6f6f',grass:'#11a52b',rumble:'#ffffff',lane:'#ffffff'},
  DARK :{road:'#696969',grass:'#0c9325',rumble:'#d23b32',lane:null},
};
let theme=LOCS[0].theme, curLoc=LOCS[0];

let segments=[], trackLength=0;
function findSegment(z){ return segments[Math.floor(z/segmentLength)%segments.length]; }
function addSeg(curve){
  const n=segments.length;
  segments.push({ index:n, curve:curve,
    p1:{world:{z:n*segmentLength},camera:{},screen:{}},
    p2:{world:{z:(n+1)*segmentLength},camera:{},screen:{}},
    color: Math.floor(n/rumbleLength)%2?COL.DARK:COL.LIGHT, frame:-1 });
}
function easeIn(a,b,p){ return a+(b-a)*p*p; }
function easeInOut(a,b,p){ return a+(b-a)*((-Math.cos(p*Math.PI)/2)+0.5); }
function addRoad(en,ho,le,cu){ for(let i=0;i<en;i++)addSeg(easeIn(0,cu,i/en)); for(let i=0;i<ho;i++)addSeg(cu); for(let i=0;i<le;i++)addSeg(easeInOut(cu,0,i/le)); }
const LEN={s:25,m:50,l:100}, CRV={e:2,m:4,h:5};
function buildTrack(){
  segments=[];
  addRoad(LEN.s,LEN.s,LEN.s,0);
  addRoad(LEN.m,LEN.m,LEN.m,CRV.m);
  addRoad(LEN.m,LEN.m,LEN.m,-CRV.e);
  addRoad(LEN.l,LEN.m,LEN.l,-CRV.h);
  addRoad(LEN.m,LEN.m,LEN.m,CRV.e);
  addRoad(LEN.l,LEN.l,LEN.l,0);
  addRoad(LEN.m,LEN.m,LEN.m,CRV.h);
  addRoad(LEN.m,LEN.m,LEN.m,-CRV.m);
  addRoad(LEN.s,LEN.s,LEN.s,0);
  trackLength=segments.length*segmentLength;
}

/* ---- race state ---- */
let cars=[], position=0, playerX=0, speed=0, lap=1, raceTime=0, lapStart=0, fastestLap=0;
let state='menu', frame=0, leftHeld=false, rightHeld=false, brakeHeld=false;

function resetRace(){
  buildTrack();
  position=0; playerX=0; speed=0; lap=1; raceTime=0; lapStart=0; fastestLap=0; frame=0;
  cars=[];
  const N=DRIVERS.length, gap=segmentLength*1.1;
  for(let i=0;i<N;i++){
    cars.push({ driver:DRIVERS[i], offset:(i%2===0?-0.5:0.5), z:(N-i)*gap,
      speed: BASE_MAX*(0.80+Math.random()*0.13), lap:1 });   // absolute speed (independent of your car)
  }
}
function carDist(c){ return (c.lap-1)*trackLength+c.z; }
function playerDist(){ return (lap-1)*trackLength+position; }
function myPosition(){ const d=playerDist(); let p=1; for(const c of cars) if(carDist(c)>d) p++; return p; }

/* ---- projection ---- */
function project(p,camX,camZ){
  p.camera.x=(p.world.x||0)-camX; p.camera.y=(p.world.y||0)-cameraHeight; p.camera.z=(p.world.z||0)-camZ;
  p.screen.scale=cameraDepth/p.camera.z;
  p.screen.x=Math.round((W/2)+(p.screen.scale*p.camera.x*W/2));
  p.screen.y=Math.round((H/2)-(p.screen.scale*p.camera.y*H/2));
  p.screen.w=Math.round(p.screen.scale*roadWidth*W/2);
}
function poly(x1,y1,x2,y2,x3,y3,x4,y4,col){ ctx.fillStyle=col; ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.lineTo(x3,y3); ctx.lineTo(x4,y4); ctx.closePath(); ctx.fill(); }
function renderSegment(x1,y1,w1,x2,y2,w2,c,fog){
  ctx.fillStyle=(c===COL.DARK?theme.gB:theme.gA); ctx.fillRect(0,y2,W,y1-y2);
  const r1=w1/4,r2=w2/4;
  poly(x1-w1-r1,y1,x1-w1,y1,x2-w2,y2,x2-w2-r2,y2,c.rumble);
  poly(x1+w1+r1,y1,x1+w1,y1,x2+w2,y2,x2+w2+r2,y2,c.rumble);
  poly(x1-w1,y1,x1+w1,y1,x2+w2,y2,x2-w2,y2,c.road);
  if(c.lane){ const l1=w1/24,l2=w2/24; poly(x1-l1,y1,x1+l1,y1,x2+l2,y2,x2-l2,y2,c.lane); }
  if(fog<1){ const s=theme.sky[1]; ctx.fillStyle=hexA(s,(1-fog)); ctx.fillRect(0,y2,W,y1-y2); }
}
function hexA(hex,a){ let c=hex.replace('#',''); if(c.length===3)c=c.split('').map(x=>x+x).join('');
  return 'rgba('+parseInt(c.slice(0,2),16)+','+parseInt(c.slice(2,4),16)+','+parseInt(c.slice(4,6),16)+','+a.toFixed(3)+')'; }
function shade(hex,f){ let c=hex.replace('#',''); if(c.length===3)c=c.split('').map(x=>x+x).join('');
  const r=Math.min(255,Math.round(parseInt(c.slice(0,2),16)*f)), g=Math.min(255,Math.round(parseInt(c.slice(2,4),16)*f)), b=Math.min(255,Math.round(parseInt(c.slice(4,6),16)*f));
  return 'rgb('+r+','+g+','+b+')'; }
function rr(x,y,w,h,r){ ctx.beginPath(); if(ctx.roundRect) ctx.roundRect(x,y,w,h,r); else ctx.rect(x,y,w,h); ctx.fill(); }

/* ---- nicer, bigger car (cartoon-3D, behind view) ---- */
function drawCar(cx,bottomY,w,color,isPlayer){
  const h=w*0.62, top=bottomY-h;
  ctx.fillStyle='rgba(0,0,0,0.30)'; ctx.beginPath(); ctx.ellipse(cx,bottomY+w*0.02,w*0.54,h*0.13,0,0,7); ctx.fill();
  ctx.fillStyle='#15140f';                                  // rear tyres
  rr(cx-w*0.54,bottomY-h*0.36,w*0.24,h*0.36,4); rr(cx+w*0.30,bottomY-h*0.36,w*0.24,h*0.36,4);
  ctx.fillStyle='#cfcfcf'; rr(cx-w*0.50,bottomY-h*0.30,w*0.06,h*0.18,2); rr(cx+w*0.44,bottomY-h*0.30,w*0.06,h*0.18,2); // rims
  ctx.fillStyle='#1a1a1a'; rr(cx-w*0.50,top,w*1.00,h*0.13,3);   // rear wing
  ctx.fillStyle='#3a3a3a'; rr(cx-w*0.44,top+h*0.02,w*0.88,h*0.045,2);
  const g=ctx.createLinearGradient(0,top,0,bottomY);          // glossy body
  g.addColorStop(0,shade(color,1.4)); g.addColorStop(0.5,color); g.addColorStop(1,shade(color,0.65));
  ctx.fillStyle=g; ctx.beginPath();
  ctx.moveTo(cx-w*0.17,top+h*0.13); ctx.lineTo(cx+w*0.17,top+h*0.13);
  ctx.quadraticCurveTo(cx+w*0.36,bottomY-h*0.30,cx+w*0.30,bottomY-h*0.05);
  ctx.lineTo(cx-w*0.30,bottomY-h*0.05);
  ctx.quadraticCurveTo(cx-w*0.36,bottomY-h*0.30,cx-w*0.17,top+h*0.13);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.20)'; rr(cx-w*0.12,top+h*0.18,w*0.09,h*0.55,3);  // side highlight
  ctx.fillStyle='#0c0c0c'; ctx.beginPath(); ctx.arc(cx,top+h*0.46,w*0.17,Math.PI,0); ctx.fill();   // halo
  ctx.fillStyle=isPlayer?'#fff':'#dcdcdc'; ctx.beginPath(); ctx.arc(cx,top+h*0.44,w*0.105,0,7); ctx.fill(); // helmet
  ctx.fillStyle=color; rr(cx-w*0.03,top+h*0.36,w*0.06,w*0.05,1);
}

/* ---- loop ---- */
let last=0, running=false;
function loop(ts){ const dt=Math.min(1/30,(ts-last)/1000||1/60); last=ts; if(state==='race') update(dt); render(); if(running) requestAnimationFrame(loop); }
function update(dt){
  raceTime+=dt;
  const seg=findSegment(position+playerZ), sp=speed/maxSpeed, dx=dt*2*sp;
  if(leftHeld) playerX-=dx; else if(rightHeld) playerX+=dx;
  playerX-=dx*sp*seg.curve*centrifugal;
  speed += (brakeHeld? -maxSpeed : maxSpeed/5)*dt;
  if((playerX<-1||playerX>1) && speed>maxSpeed/4) speed -= (maxSpeed/2)*dt;   // grass slows you
  speed=Math.max(0,Math.min(maxSpeed,speed));
  playerX=Math.max(-2.2,Math.min(2.2,playerX));
  for(const c of cars){ c.z+=c.speed*dt; while(c.z>=trackLength){ c.z-=trackLength; c.lap++; } }
  // gentle contact: you get nudged AROUND a car (so you can overtake) — barely any speed loss
  for(const c of cars){
    let dz=c.z-(position%trackLength); if(dz<-trackLength/2)dz+=trackLength; if(dz>trackLength/2)dz-=trackLength;
    if(dz>-segmentLength*0.5 && dz<segmentLength*1.2 && Math.abs(playerX-c.offset)<0.42){
      playerX += (playerX>=c.offset?0.07:-0.07);
      speed *= 0.997;
    }
  }
  position+=speed*dt;
  while(position>=trackLength){ position-=trackLength; onLap(); }
}
function onLap(){ const t=raceTime-lapStart; lapStart=raceTime; if(t>0&&(fastestLap===0||t<fastestLap)) fastestLap=t; lap++; if(lap>LAPS_TOTAL) finishRace(); }

function render(){
  const sky=ctx.createLinearGradient(0,0,0,H*0.62); sky.addColorStop(0,theme.sky[0]); sky.addColorStop(1,theme.sky[1]);
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(255,245,210,0.85)'; ctx.beginPath(); ctx.arc(W*0.74,H*0.15,Math.min(W,H)*0.06,0,7); ctx.fill();
  ctx.fillStyle=theme.hill; ctx.beginPath(); ctx.moveTo(0,H*0.52);
  for(let i=0;i<=10;i++) ctx.lineTo(W*i/10,H*(0.47-0.035*Math.sin(i*1.6+1))); ctx.lineTo(W,H*0.52); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#2c3a57'; ctx.fillRect(0,H*0.475,W,H*0.045);
  ctx.fillStyle='rgba(255,255,255,0.06)'; for(let i=0;i<W;i+=8) ctx.fillRect(i,H*0.475,4,H*0.045);

  frame++;
  const base=findSegment(position), basePct=(position%segmentLength)/segmentLength;
  let x=0,dxx=-(base.curve*basePct),maxy=H;
  for(let n=0;n<drawDistance;n++){
    const seg=segments[(base.index+n)%segments.length], looped=seg.index<base.index, camZ=position-(looped?trackLength:0);
    project(seg.p1,(playerX*roadWidth)-x,camZ); project(seg.p2,(playerX*roadWidth)-x-dxx,camZ);
    x+=dxx; dxx+=seg.curve; seg.frame=frame;
    if(seg.p1.camera.z<=cameraDepth||seg.p2.screen.y>=maxy) continue;
    const fog=1/Math.pow(Math.E,(n/drawDistance)*(n/drawDistance)*4);
    renderSegment(seg.p1.screen.x,seg.p1.screen.y,seg.p1.screen.w,seg.p2.screen.x,seg.p2.screen.y,seg.p2.screen.w,seg.color,fog);
    maxy=seg.p2.screen.y;
  }
  const ordered=cars.slice().sort((a,b)=>b.z-a.z);
  for(const c of ordered){
    const seg=findSegment(c.z); if(seg.frame!==frame) continue;
    const sc=seg.p2.screen; if(!sc||!sc.w) continue;
    const cx=sc.x+c.offset*sc.w, cw=Math.max(12,sc.w*0.95);
    if(sc.y<H*0.30||sc.y>H+60) continue;
    drawCar(cx,sc.y,cw,c.driver.c,false);
    if(cw>26){ const fs=Math.max(10,Math.round(cw*0.18)), ty=sc.y-cw*0.72;
      ctx.font='bold '+fs+'px Trebuchet MS'; ctx.textAlign='center';
      ctx.lineWidth=3; ctx.strokeStyle='rgba(0,0,0,0.6)'; ctx.strokeText(c.driver.name,cx,ty);
      ctx.fillStyle=c.driver.c; ctx.fillText(c.driver.name,cx,ty); }
  }
  if(state!=='menu'&&state!=='shop'){
    const pw=Math.max(110,W*0.24), tilt=(rightHeld?1:leftHeld?-1:0)*pw*0.06;
    drawCar(W/2+tilt,H-14,pw,getCar(career.car).color,true);
  }
  if(state==='race'||state==='countdown') updateHud();
}
function fmt(s){ if(!s) return '--'; const m=Math.floor(s/60), r=s-m*60; return (m>0?m+':':'')+r.toFixed(2).padStart(m>0?5:4,'0'); }
function updateHud(){
  const car=getCar(career.car);
  document.getElementById('hud-left').innerHTML=`P <b>${myPosition()}</b>/${cars.length+1}<br>Lap <b>${Math.min(lap,LAPS_TOTAL)}</b>/${LAPS_TOTAL}<br><span style="color:#9fb3d8">⏱ ${fmt(raceTime)}</span>`;
  document.getElementById('speedo').innerHTML=`<span class="kmh">${Math.round(speed/maxSpeed*car.top)}</span> km/h<br><span style="color:#9fb3d8">best lap ${fastestLap?fmt(fastestLap):'--'}</span>`;
}

/* ---- menu / shop ---- */
function show(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden')); document.getElementById(id).classList.remove('hidden');
  document.getElementById('hud').classList.add('hidden'); document.getElementById('steerhint').classList.add('hidden'); document.getElementById('lights').style.display='none'; }
function renderMenu(){
  const car=getCar(career.car);
  document.getElementById('wallet').innerHTML=`💰 <b>₹${career.money}</b> &nbsp;•&nbsp; 🏎️ <b>${car.name}</b> (${car.top} km/h) <button class="btn green" id="shopBtn" style="padding:8px 16px;font-size:14px;margin:0 0 0 6px">🛒 SHOP</button>`;
  document.getElementById('shopBtn').onclick=openShop;
  const list=document.getElementById('locList'); list.innerHTML='';
  LOCS.forEach(L=>{
    const afford=career.money>=L.fee;
    const d=document.createElement('div'); d.className='item';
    d.innerHTML=`<div class="ic">${L.flag}</div>
      <div class="info"><div class="t">${L.name} Grand Prix</div>
        <div class="d">Entry ₹${L.fee} • Win ₹${L.win} • 3 laps vs 7 drivers</div></div>
      <div class="act"><button class="btn ${afford?'':'alt'}" ${afford?'':'disabled'} style="padding:9px 18px;font-size:14px;margin:0">RACE</button></div>`;
    const b=d.querySelector('button');
    if(afford) b.onclick=()=>enterRace(L);
    list.appendChild(d);
  });
  show('scr-menu');
}
function openShop(){
  document.getElementById('shopWallet').textContent='💰 ₹'+career.money;
  const list=document.getElementById('carList'); list.innerHTML='';
  CARS.forEach(C=>{
    const owned=career.owned.includes(C.id), selected=career.car===C.id, afford=career.money>=C.price;
    const d=document.createElement('div'); d.className='item';
    let actHtml = selected ? `<span class="pill">SELECTED</span>`
                : owned   ? `<button class="btn alt" style="padding:9px 16px;font-size:14px;margin:0">SELECT</button>`
                : `<button class="btn ${afford?'':'alt'}" ${afford?'':'disabled'} style="padding:9px 16px;font-size:14px;margin:0">₹${C.price}</button>`;
    d.innerHTML=`<div class="ic">🏎️</div>
      <div class="info"><div class="t" style="color:${C.color}">${C.name}</div>
        <div class="d">Top speed ${C.top} km/h${C.price?'':' • starter'}</div></div>
      <div class="act">${actHtml}</div>`;
    const b=d.querySelector('button');
    if(b){ if(owned) b.onclick=()=>{ career.car=C.id; saveCareer(); openShop(); };
      else b.onclick=()=>{ if(career.money>=C.price){ career.money-=C.price; career.owned.push(C.id); career.car=C.id; saveCareer(); openShop(); } }; }
    list.appendChild(d);
  });
  show('scr-shop');
}
document.getElementById('shopBack').onclick=renderMenu;

/* ---- race flow ---- */
function enterRace(L){
  if(career.money<L.fee) return;
  career.money-=L.fee; saveCareer();          // pay entry fee
  curLoc=L; theme=L.theme;
  resetRace();
  maxSpeed=BASE_MAX*(getCar(career.car).top/330);
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
  document.getElementById('hud').classList.remove('hidden');
  document.getElementById('steerhint').classList.remove('hidden');
  state='countdown';
  if(!running){ running=true; last=performance.now(); requestAnimationFrame(loop); }
  setLights('red');
  setTimeout(()=>{ if(state==='countdown') setLights('yellow'); },1100);
  setTimeout(()=>{ if(state==='countdown'){ setLights('green'); state='race'; raceTime=0; lapStart=0; } },2200);
  setTimeout(()=>{ document.getElementById('lights').style.display='none'; },2900);
}
function setLights(c){
  document.getElementById('lights').style.display='flex';
  document.getElementById('lampR').classList.toggle('on',c==='red');
  document.getElementById('lampY').classList.toggle('on',c==='yellow');
  document.getElementById('lampG').classList.toggle('on',c==='green');
  const t=document.getElementById('lightsTxt'); t.textContent=c==='red'?'On your marks…':c==='yellow'?'Get ready…':'GO! GO! GO!'; t.style.color=c==='green'?'#27e36a':'#fff';
}
function finishRace(){
  state='finish';
  document.getElementById('lights').style.display='none'; document.getElementById('steerhint').classList.add('hidden');
  const board=[{name:'You',dist:playerDist(),me:true,color:getCar(career.car).color}];
  cars.forEach(c=>board.push({name:c.driver.name,dist:carDist(c),color:c.driver.c}));
  board.sort((a,b)=>b.dist-a.dist);
  const pos=board.findIndex(b=>b.me)+1;
  const prize=Math.round(curLoc.win*(PRIZE_FACTOR[pos-1]||0));
  career.money+=prize; if(career.money<100) career.money=100; saveCareer();   // never broke: floor ₹100
  const head=pos===1?'🏆 RACE WIN!':pos<=3?'🏆 PODIUM!':`P${pos} finish`;
  document.getElementById('finTitle').textContent=head;
  document.getElementById('finTitle').style.color=pos===1?'#ffd54a':pos<=3?'#39ff88':'#fff';
  document.getElementById('finSub').innerHTML=`${curLoc.flag} ${curLoc.name} GP — finished <b>P${pos}</b><br>💰 Prize <b>₹${prize}</b> • Balance <b>₹${career.money}</b> • fastest lap ${fastestLap?fmt(fastestLap):'--'}`;
  let h=''; board.forEach((b,i)=>{ h+=`<div class="brow${b.me?' me':''}"><span class="pos">${i+1}</span>
      <span style="flex:1"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:${b.color};margin-right:8px"></span>${b.name}${b.me?' (you)':''}</span>
      <span style="color:#9fb3d8">₹${Math.round(curLoc.win*(PRIZE_FACTOR[i]||0))}</span></div>`; });
  document.getElementById('finBoard').innerHTML=h;
  document.getElementById('hud').classList.add('hidden');
  show('scr-finish');
}
document.getElementById('againBtn').onclick=()=>{ if(career.money>=curLoc.fee) enterRace(curLoc); else renderMenu(); };
document.getElementById('menuBtn').onclick=renderMenu;

/* ---- input ---- */
window.addEventListener('keydown',e=>{
  if(['ArrowLeft','ArrowRight','ArrowDown','ArrowUp',' '].includes(e.key)) e.preventDefault();
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A') leftHeld=true;
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') rightHeld=true;
  if(e.key==='ArrowDown'||e.key==='s'||e.key==='S') brakeHeld=true;
});
window.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A') leftHeld=false;
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') rightHeld=false;
  if(e.key==='ArrowDown'||e.key==='s'||e.key==='S') brakeHeld=false;
});
function touchAt(x,y){ const r=cv.getBoundingClientRect(); const px=x-r.left, py=y-r.top;
  brakeHeld=py>H*0.80; if(brakeHeld){ leftHeld=rightHeld=false; return; } leftHeld=px<W/2; rightHeld=px>=W/2; }
function clearTouch(){ leftHeld=rightHeld=brakeHeld=false; }
cv.addEventListener('touchstart',e=>{ const t=e.touches[0]; touchAt(t.clientX,t.clientY); e.preventDefault(); },{passive:false});
cv.addEventListener('touchmove', e=>{ const t=e.touches[0]; touchAt(t.clientX,t.clientY); e.preventDefault(); },{passive:false});
cv.addEventListener('touchend', e=>{ if(e.touches.length===0) clearTouch(); },{passive:false});
cv.addEventListener('mousedown',e=>touchAt(e.clientX,e.clientY));
cv.addEventListener('mousemove',e=>{ if(e.buttons&1) touchAt(e.clientX,e.clientY); });
window.addEventListener('mouseup',clearTouch);

buildTrack();
renderMenu();
</script>
</body>
</html>
