<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Penalty Kings</title>
<link rel="manifest" href="../manifest.webmanifest" />
<meta name="theme-color" content="#0a0e1a" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Penalty Kings" />
<link rel="apple-touch-icon" href="../icon-180.png" />
<link rel="icon" href="../icon-192.png" />
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;font-family:'Trebuchet MS','Segoe UI',sans-serif;color:#fff;
    background:radial-gradient(circle at 50% 22%,#15463a,#070d14 78%);}
  body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center;user-select:none}
  .ball{font-size:60px;margin-bottom:4px}
  h1{font-size:clamp(34px,9vw,60px);letter-spacing:1px;margin-bottom:4px;
    background:linear-gradient(90deg,#ffd54a,#39ff88 60%,#3aa0ff);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .sub{color:#9fd9c2;margin-bottom:30px;font-size:clamp(14px,3.5vw,18px)}
  .choose{display:grid;grid-template-columns:1fr 1fr;gap:18px;max-width:520px;width:100%}
  @media(max-width:430px){ .choose{grid-template-columns:1fr} }
  a.opt{display:block;text-decoration:none;color:#fff;border-radius:22px;padding:26px 18px;border:3px solid rgba(255,255,255,.14);
    transition:transform .12s,border-color .12s,box-shadow .12s}
  a.opt:hover{transform:translateY(-5px) scale(1.02);border-color:#fff;box-shadow:0 14px 34px rgba(0,0,0,.45)}
  a.opt:active{transform:scale(.97)}
  a.opt.d3{background:linear-gradient(135deg,#1ea85a,#0a5a2e)}
  a.opt.d2{background:linear-gradient(135deg,#3a6cf0,#16306e)}
  a.opt .tag{font-size:46px;font-weight:900;display:block;line-height:1}
  a.opt h2{font-size:22px;margin:10px 0 6px}
  a.opt p{color:#dfeee7;font-size:13px;line-height:1.4}
  .exit{margin-top:30px;display:inline-block;text-decoration:none;color:#9fd9c2;font-size:15px;font-weight:bold;
    background:rgba(8,18,12,.5);border:1px solid rgba(120,255,200,.22);border-radius:24px;padding:11px 24px}
  .exit:active{transform:scale(.96)}
</style>
</head>
<body>
  <div class="ball">⚽</div>
  <h1>PENALTY KINGS</h1>
  <div class="sub">Choose how you want to play the shootout tournament.</div>
  <div class="choose">
    <a class="opt d3" href="3d.html">
      <span class="tag">3D</span>
      <h2>3D Shootout</h2>
      <p>New! Cinematic 3D penalties — aim the corners, beat the keeper, save with timing.</p>
    </a>
    <a class="opt d2" href="2d.html">
      <span class="tag">2D</span>
      <h2>Classic 2D</h2>
      <p>The original fast-paced 2D Penalty Kings shootout.</p>
    </a>
  </div>
  <div style="margin-top:26px;display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
    <a class="exit" id="IGA_login" style="margin-top:0;cursor:pointer" onclick="window.IGAuth && IGAuth.openAuth()">👤 Log in</a>
    <a class="exit" id="IGA_lb" style="margin-top:0;cursor:pointer" onclick="window.IGAuth && IGAuth.showLeaderboard('football','Penalty Kings')">🏆 Leaderboard</a>
  </div>
  <a class="exit" href="../">🏠 All Ilan Games</a>

  <script src="../supabase-config.js"></script>
  <script src="../auth.js" defer></script>
  <script>
  document.addEventListener('DOMContentLoaded', function(){
    if(!window.IGAuth) return;
    function pkWins(){
      try{
        var s=JSON.parse(localStorage.getItem('soc_store_v1'));
        var a=(s&&Array.isArray(s.accounts))?s.accounts.find(function(x){return x.id===s.activeId;}):null;
        return (a&&a.pk)?(a.pk.won|0):0;
      }catch(e){ return 0; }
    }
    IGAuth.onChange(function(p){
      var b=document.getElementById('IGA_login');
      if(b) b.textContent = p?('👤 '+IGAuth.displayName()):'👤 Log in';
      IGAuth.submitScore('football', pkWins());
    });
  });
  </script>
  <script src="../analytics.js" defer></script>
  <script src="../announce.js" defer></script>
<script src="../rec.js" defer></script>
</body>
</html>
