<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Archer Duel</title>
<link rel="manifest" href="../manifest.webmanifest" /><meta name="theme-color" content="#13243b" />
<meta name="mobile-web-app-capable" content="yes" /><meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" /><meta name="apple-mobile-web-app-title" content="Archer Duel" />
<link rel="apple-touch-icon" href="../icon-180.png" /><link rel="icon" href="../icon-192.png" />
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
  html,body{height:100%;overflow:hidden;background:#13243b;font-family:'Trebuchet MS','Segoe UI',sans-serif;color:#fff}
  canvas{position:fixed;inset:0;width:100%;height:100%;display:block;touch-action:none;cursor:crosshair}
  #ov{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;z-index:5;padding:20px;background:rgba(8,16,30,.55)}
  #ov.hidden{display:none}
  h1{font-size:clamp(34px,9vw,58px);background:linear-gradient(90deg,#ffd54a,#ff8c5a);-webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{color:#c7d6f0;margin:8px 0 18px;font-size:16px;line-height:1.5;max-width:440px}
  .big{font-size:46px;font-weight:900;color:#ffd54a}
  .btn{background:linear-gradient(135deg,#ffd54a,#ff8c3d);color:#2a1500;border:none;padding:15px 44px;font-size:20px;font-weight:900;border-radius:30px;cursor:pointer;box-shadow:0 6px 18px rgba(255,160,40,.4)}
  .row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:14px}
  .ghost{background:rgba(255,255,255,.08);border:1px solid rgba(180,200,255,.3);color:#dfe6ff;border-radius:24px;padding:11px 20px;font-size:15px;font-weight:700;cursor:pointer;text-decoration:none}
</style></head>
<body>
<canvas id="g"></canvas>
<div id="ov">
  <h1>🏹 ARCHER DUEL</h1>
  <div class="sub">Drag back from your archer to aim & power, release to fire. Mind the arc — gravity pulls the arrow down!<br>Knock out rivals one by one; each is tougher.</div>
  <button class="btn" id="start">DUEL ▶</button>
  <div class="sub" id="best"></div>
  <div class="row">
    <a class="ghost" id="IGA_login" onclick="window.IGAuth&&IGAuth.openAuth()">👤 Log in</a>
    <a class="ghost" onclick="window.IGAuth&&IGAuth.showLeaderboard('archer','Archer Duel')">🏆 Leaderboard</a>
    <a class="ghost" href="../">🏠 All Games</a>
  </div>
</div>
<script>
"use strict";
const cv=document.getElementById('g'),ctx=cv.getContext('2d');let W=0,H=0,DPR=1;
function resize(){DPR=Math.min(2,devicePixelRatio||1);W=innerWidth;H=innerHeight;cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+'px';cv.style.height=H+'px';ctx.setTransform(DPR,0,0,DPR,0,0);groundY=H*0.82;}
addEventListener('resize',resize);
const rand=(a,b)=>a+Math.random()*(b-a);
let best=(()=>{try{return(+JSON.parse(localStorage.getItem('archerDuel_v1')).best)||0;}catch(e){return 0;}})();
function saveBest(){try{localStorage.setItem('archerDuel_v1',JSON.stringify({best}));}catch(e){}}
const G=900;let groundY;resize();
let state='menu',me,foe,arrow,aim,turn,round,wins,msg,msgT,shake,parts;
function setupRound(){ me={x:W*0.13,y:groundY,hp:100,r:22}; foe={x:rand(W*0.6,W*0.88),y:groundY,hp:100,r:22}; arrow=null;aim=null;turn='me';msg='Your shot!';msgT=1.2; }
function start(){document.getElementById('ov').classList.add('hidden');state='play';round=1;wins=0;parts=[];shake=0;setupRound();}
function gameOver(win){state='over';if(wins>best){best=wins;saveBest();}try{if(window.IGAuth)IGAuth.submitScore('archer',best);}catch(e){}
  const ov=document.getElementById('ov');ov.querySelector('h1').textContent=win?'🏆 CHAMPION!':'💀 DEFEATED';
  ov.querySelector('.sub').innerHTML=win?'You beat them all!':'A rival knocked you out.';
  ov.querySelector('#start').textContent='DUEL AGAIN ▶';ov.querySelector('#best').innerHTML='<div class="big">'+wins+'</div>KOs • Best: '+best;
  setTimeout(()=>ov.classList.remove('hidden'),600);}
function fire(shooter,vx,vy){ const s=shooter==='me'?me:foe; arrow={x:s.x,y:s.y-30,vx,vy,from:shooter}; }
function aiShoot(){ const dx=me.x-foe.x, dy=(me.y-30)-(foe.y-30), t=1.05; const err=Math.max(12,150-round*18);
  const vx=dx/t+rand(-err,err), vy=(dy-0.5*G*t*t)/t+rand(-err,err); fire('foe',vx,vy); msg=''; }
function banner(t){msg=t;msgT=1.3;}
let last=0;
function loop(now){requestAnimationFrame(loop);const dt=Math.min(.04,(now-last)/1000||0);last=now;
  if(shake>0)shake=Math.max(0,shake-dt*1.6);
  const sx=shake>0?(Math.random()*2-1)*shake*9:0,sy=shake>0?(Math.random()*2-1)*shake*9:0;ctx.setTransform(DPR,0,0,DPR,sx*DPR,sy*DPR);
  const sky=ctx.createLinearGradient(0,0,0,H);sky.addColorStop(0,'#1d3a63');sky.addColorStop(1,'#4a78b0');ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#3a6b3a';ctx.fillRect(0,groundY,W,H-groundY);ctx.fillStyle='#2f5a2f';ctx.fillRect(0,groundY,W,6);
  if(state==='play'){
    if(arrow){ arrow.vx*=1; arrow.vy+=G*dt; arrow.x+=arrow.vx*dt; arrow.y+=arrow.vy*dt;
      const tgt=arrow.from==='me'?foe:me;
      if(Math.hypot(arrow.x-tgt.x,arrow.y-(tgt.y-26))<tgt.r+6){ tgt.hp-=34; shake=.4; for(let i=0;i<14;i++)parts.push({x:arrow.x,y:arrow.y,vx:rand(-200,200),vy:rand(-260,40),life:.6,c:'#ffd54a'}); sfx(200,.12,'square'); arrow=null;
        if(tgt.hp<=0){ if(tgt===foe){ wins++; round++; if(round>6){ gameOver(true); } else { banner('KO! Next rival…'); setTimeout(()=>{if(state==='play')setupRound();},1100); } }
          else { gameOver(false); } }
        else { nextTurn(); } }
      else if(arrow && (arrow.y>groundY || arrow.x<-30 || arrow.x>W+30)){ for(let i=0;i<6;i++)parts.push({x:arrow.x,y:Math.min(arrow.y,groundY),vx:rand(-80,80),vy:rand(-120,0),life:.5,c:'#caa'}); arrow=null; nextTurn(); }
    }
  }
  // archers
  if(me)drawArcher(me,'#3a86ff',1);
  if(foe)drawArcher(foe,'#e0503a',-1);
  // aim preview
  if(aim&&turn==='me'&&!arrow){ const vx=(me.x-aim.x)*4.2,vy=(me.y-30-aim.y)*4.2;
    ctx.fillStyle='rgba(255,255,255,.7)';let px=me.x,py=me.y-30,pvx=vx,pvy=vy;
    for(let i=0;i<22;i++){pvy+=G*0.045;px+=pvx*0.045;py+=pvy*0.045;if(i%2===0){ctx.beginPath();ctx.arc(px,py,3,0,6.28);ctx.fill();}}
    const p=Math.min(1,Math.hypot(me.x-aim.x,me.y-30-aim.y)/170);ctx.fillStyle=p>0.9?'#ff5a5a':'#ffd54a';ctx.fillRect(20,H-28,200*p,10);ctx.strokeStyle='#fff';ctx.strokeRect(20,H-28,200,10);}
  // arrow
  if(arrow){const a=Math.atan2(arrow.vy,arrow.vx);ctx.save();ctx.translate(arrow.x,arrow.y);ctx.rotate(a);ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(-16,0);ctx.lineTo(10,0);ctx.stroke();ctx.fillStyle='#ffd54a';ctx.beginPath();ctx.moveTo(10,0);ctx.lineTo(2,-4);ctx.lineTo(2,4);ctx.fill();ctx.restore();}
  for(const p of parts){p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=600*dt;p.life-=dt*1.6;}parts=parts.filter(p=>p.life>0);for(const p of parts){ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.c;ctx.fillRect(p.x,p.y,3,3);}ctx.globalAlpha=1;
  if(state!=='menu'){hpBar(20,18,me?me.hp:0,'#3a86ff','YOU');hpBar(W-180,18,foe?foe.hp:0,'#e0503a','RIVAL '+round);
    ctx.fillStyle='#fff';ctx.font='600 13px Trebuchet MS';ctx.textAlign='center';ctx.fillText('KOs: '+wins+'   •   best '+best,W/2,20);}
  if(msgT>0){msgT-=dt;ctx.globalAlpha=Math.min(1,msgT);ctx.fillStyle='#ffd54a';ctx.font='900 30px Trebuchet MS';ctx.textAlign='center';ctx.fillText(msg,W/2,H*0.4);ctx.globalAlpha=1;}
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
function nextTurn(){ if(state!=='play')return; if(turn==='me'){ turn='foe'; setTimeout(()=>{ if(state==='play'&&turn==='foe')aiShoot(); },800); } else { turn='me'; banner('Your shot!'); } }
function drawArcher(s,col,face){ const x=s.x,y=s.y;
  ctx.fillStyle='rgba(0,0,0,.2)';ctx.beginPath();ctx.ellipse(x,y,18,6,0,0,6.28);ctx.fill();
  ctx.fillStyle=col;ctx.fillRect(x-9,y-32,18,30);ctx.fillStyle='#f1c27d';ctx.beginPath();ctx.arc(x,y-40,10,0,6.28);ctx.fill();
  ctx.strokeStyle='#6b4226';ctx.lineWidth=3;ctx.beginPath();ctx.arc(x+face*12,y-26,14,-1.1,1.1);ctx.stroke(); }
function hpBar(x,y,hp,col,lbl){ ctx.fillStyle='rgba(0,0,0,.4)';ctx.fillRect(x,y,160,16);ctx.fillStyle=col;ctx.fillRect(x,y,160*Math.max(0,hp)/100,16);ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.strokeRect(x,y,160,16);ctx.fillStyle='#fff';ctx.font='700 11px Trebuchet MS';ctx.textAlign='left';ctx.fillText(lbl,x+2,y+27);}
let AC=null;function sfx(f,d,t){try{if(!AC)AC=new(AudioContext||webkitAudioContext)();const o=AC.createOscillator(),g=AC.createGain();o.type=t||'sine';o.frequency.value=f;g.gain.value=.2;o.connect(g);g.connect(AC.destination);o.start();g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+d);o.stop(AC.currentTime+d+.02);}catch(e){}}
cv.addEventListener('pointerdown',e=>{if(state==='play'&&turn==='me'&&!arrow)aim={x:e.clientX,y:e.clientY};});
addEventListener('pointermove',e=>{if(aim)aim={x:e.clientX,y:e.clientY};});
addEventListener('pointerup',e=>{if(!aim||arrow||turn!=='me'){aim=null;return;}const vx=(me.x-aim.x)*4.2,vy=(me.y-30-aim.y)*4.2;if(Math.hypot(vx,vy)>40){fire('me',vx,vy);sfx(420,.06,'triangle');}aim=null;});
document.getElementById('start').onclick=start;
document.getElementById('best').innerHTML=best?('Best: '+best+' KOs'):'';
requestAnimationFrame(loop);
</script>
<script src="../supabase-config.js"></script>
<script src="../auth.js" defer></script>
<script>document.addEventListener('DOMContentLoaded',function(){ if(!window.IGAuth)return;
  IGAuth.onChange(function(p){ var b=document.getElementById('IGA_login'); if(b)b.textContent=p?('👤 '+IGAuth.displayName()):'👤 Log in';
    try{ var s=JSON.parse(localStorage.getItem('archerDuel_v1')); if(s&&+s.best>0) IGAuth.submitScore('archer',+s.best); }catch(e){} }); });</script>
<script src="../analytics.js" defer></script>
<script src="../announce.js" defer></script>
</body></html>
