<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Paper Territory</title>
<link rel="manifest" href="../manifest.webmanifest" />
<meta name="theme-color" content="#0e0f1a" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Paper Territory" />
<link rel="apple-touch-icon" href="../icon-180.png" />
<link rel="icon" href="../icon-192.png" />
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
  html,body{height:100%;overflow:hidden;overscroll-behavior:none;background:#0e0f1a;font-family:'Trebuchet MS','Segoe UI',sans-serif;color:#fff}
  body{position:fixed;inset:0;width:100%;touch-action:none}   /* lock page — no horizontal scroll / edge-swipe */
  canvas{position:fixed;inset:0;width:100%;height:100%;display:block;touch-action:none;cursor:pointer}
  /* on-screen D-pad (two-handed: left/right under left thumb, up/down under right thumb) */
  #pad{position:fixed;inset:0;z-index:4;pointer-events:none;display:none}
  #pad.on{display:block}
  .dbtn{position:absolute;width:64px;height:64px;border-radius:50%;pointer-events:auto;
    background:rgba(255,255,255,.13);border:2px solid rgba(255,255,255,.32);color:#fff;font-size:27px;font-weight:900;
    display:flex;align-items:center;justify-content:center;touch-action:none;user-select:none}
  .dbtn:active{background:rgba(125,255,155,.55);transform:scale(.93)}
  #bL{left:16px;bottom:calc(env(safe-area-inset-bottom) + 36px)}
  #bR{left:94px;bottom:calc(env(safe-area-inset-bottom) + 36px)}
  #bU{right:52px;bottom:calc(env(safe-area-inset-bottom) + 104px)}
  #bD{right:52px;bottom:calc(env(safe-area-inset-bottom) + 30px)}
  #ov{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;z-index:5;padding:20px;background:rgba(8,8,16,.62)}
  #ov.hidden{display:none}
  h1{font-size:clamp(32px,8vw,54px);background:linear-gradient(90deg,#7dff9b,#5ef0ff);-webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{color:#bcc6e6;margin:8px 0 16px;font-size:15px;line-height:1.5;max-width:440px}
  .big{font-size:46px;font-weight:900;color:#7dff9b}
  .btn{background:linear-gradient(135deg,#7dff9b,#22c55e);color:#04220f;border:none;padding:15px 40px;font-size:20px;font-weight:900;border-radius:30px;cursor:pointer;box-shadow:0 6px 18px rgba(40,200,120,.4)}
  .row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:14px}
  .ghost{background:rgba(255,255,255,.08);border:1px solid rgba(150,200,255,.3);color:#cfe0ff;border-radius:24px;padding:11px 20px;font-size:15px;font-weight:700;cursor:pointer;text-decoration:none}
</style>
</head>
<body>
<canvas id="g"></canvas>
<div id="pad">
  <div class="dbtn" id="bL">◀</div>
  <div class="dbtn" id="bR">▶</div>
  <div class="dbtn" id="bU">▲</div>
  <div class="dbtn" id="bD">▼</div>
</div>
<div id="ov">
  <h1>🟩 PAPER TERRITORY</h1>
  <div class="sub">Swipe / arrow keys to steer. Leave your zone to draw a trail, then <b>return to your zone to claim everything inside</b>.<br>If a rival crosses your trail you pop — and don't cross your own, or hit the glowing wall! Own the most land.</div>
  <button class="btn" id="start">CLAIM ▶</button>
  <div class="row" style="margin-top:12px">
    <button class="btn" id="mpBtn" style="background:linear-gradient(135deg,#7dc4ff,#2a7ad6);color:#04203a;padding:13px 30px;font-size:17px">🎮 Play with Friends</button>
  </div>
  <div class="sub" id="best" style="margin-top:14px"></div>
  <div class="row">
    <a class="ghost" id="tutBtn">📖 Tutorial</a>
    <a class="ghost" id="IGA_login" onclick="window.IGAuth&&IGAuth.openAuth()">👤 Log in</a>
    <a class="ghost" onclick="window.IGAuth&&IGAuth.showLeaderboard('paper','Paper Territory')">🏆 Leaderboard</a>
    <a class="ghost" href="../">🏠 All Games</a>
  </div>
</div>

<!-- multiplayer overlay (room / lobby / rematch) — content set from JS -->
<div id="mpov" class="hidden" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;z-index:6;padding:20px;background:rgba(8,8,16,.8);overflow-y:auto">
</div>
<style>
  #mpov.hidden{display:none !important}
  #mpov .card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);border-radius:16px;padding:16px;width:100%;max-width:420px;margin:8px 0}
  #mpov input{background:rgba(0,0,0,.35);border:1px solid rgba(150,200,255,.3);border-radius:12px;padding:12px;color:#fff;font-size:22px;font-weight:900;text-align:center;letter-spacing:6px;text-transform:uppercase;width:100%}
  #mpov .plist{display:flex;flex-direction:column;gap:8px;width:100%;max-width:420px}
  #mpov .prow{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.06);border-radius:12px;padding:10px 12px;font-weight:700;text-align:left}
  #mpov .dot{width:22px;height:22px;border-radius:50%;flex:0 0 auto}
  #mpov .lbl{font-size:12px;font-weight:900;letter-spacing:1.5px;color:#9fb3d8;text-transform:uppercase}
  #mpov .mini{font-size:13px;color:#bcc6e6}
  #mpov .tag{font-size:11px;font-weight:900;padding:2px 8px;border-radius:999px;background:rgba(125,196,255,.2);color:#7dc4ff}
</style>
<div id="mpmsg" class="hidden" style="position:fixed;top:0;left:0;right:0;text-align:center;z-index:7;pointer-events:none;padding-top:max(10px,env(safe-area-inset-top))">
  <span id="mpmsgt" style="display:inline-block;background:rgba(8,12,20,.85);border:1px solid rgba(150,200,255,.3);border-radius:999px;padding:8px 18px;font-weight:800;font-size:14px"></span>
</div>
<script>
"use strict";
const cv=document.getElementById('g'), ctx=cv.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){ DPR=Math.min(2,devicePixelRatio||1); W=innerWidth;H=innerHeight; cv.width=W*DPR;cv.height=H*DPR; cv.style.width=W+'px';cv.style.height=H+'px'; ctx.setTransform(DPR,0,0,DPR,0,0); layout(); }
addEventListener('resize',resize);
const rand=(a,b)=>a+Math.random()*(b-a), ri=(a,b)=>(a+Math.random()*(b-a))|0;
const SAVE='paperTerritory_v1';
let best=(()=>{ try{ return (+JSON.parse(localStorage.getItem(SAVE)).best)||0; }catch(e){ return 0; } })();
function saveBest(){ try{ localStorage.setItem(SAVE, JSON.stringify({best})); }catch(e){} }

const GW=40, GH=56;
let cell, offx, offy;
function layout(){ cell=Math.floor(Math.min(W/GW, H/GH)); offx=(W-cell*GW)/2; offy=(H-cell*GH)/2; }
resize();
const idx=(x,y)=>y*GW+x;
const COLS=[ {b:'#2bbd5a',t:'#7dff9b'}, {b:'#c0392b',t:'#ff7b6b'}, {b:'#2a7ad6',t:'#7dc4ff'}, {b:'#d98b1e',t:'#ffd07a'} ];
let colMap=[0,1,2,3];   // player id -> colour index (shuffled in multiplayer)

/* multiplayer state (see the ONLINE section far below) */
const mp={ on:false, role:null, slot:0, netDirs:{}, tick:0, winner:0, players:null };

let owner, trail, players, state='menu', mvT, msg, msgT, parts, milestone;
function stamp(id,cx,cy){ for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){ const x=cx+dx,y=cy+dy; if(x>=0&&x<GW&&y>=0&&y<GH) owner[idx(x,y)]=id; } }
function spawnPlayer(id,cx,cy,dir){ return {id,x:cx,y:cy,dir,ndir:dir,onTrail:false,alive:true,respT:0,human:id===1}; }

/* ---------- coach-guided tutorial (tap to continue, like Fruit Arena) ---------- */
let tutMode=false, tutStep=0, tutPhase='brief', coachMsg='', tutClaimed=false;
const TSTEPS=[
  { brief:"👋 Hi! I'm your coach. This green block is YOUR base — you always start here." },
  { brief:"Move with the ARROW KEYS, a SWIPE, or the on-screen ◀▶▲▼ buttons. Try moving OUT of your base!", act:true, hint:"move out of your base", done:()=>players[0]&&players[0].onTrail },
  { brief:"Nice — see the bright trail you leave behind? Now head BACK into your base to claim everything inside the loop!", act:true, hint:"return to your base", done:()=>tutClaimed },
  { brief:"🎉 You claimed new land! But careful: if a rival crosses your trail — or you cross your OWN trail — you POP." },
  { brief:"⚠️ See the glowing WALL around the edge, with the yellow corners? Never run into it — you POP! Always stay INSIDE the border." },
  { brief:"That's it! Claim as much land as you can. Tap to start playing!", end:true },
];
function startTut(){ document.getElementById('ov').classList.add('hidden'); state='play'; showPad(true); tutMode=true; tutStep=0; tutPhase='brief'; tutClaimed=false; coachMsg='';
  owner=new Int8Array(GW*GH); trail=new Int8Array(GW*GH); parts=[]; msg=''; msgT=0; mvT=0; milestone=999;
  players=[ spawnPlayer(1, GW>>1, GH-7, 3) ]; stamp(1,players[0].x,players[0].y); tutBrief(); }
function tutBrief(){ tutPhase='brief'; coachMsg=TSTEPS[tutStep].brief; }
function tutContinue(){ if(tutPhase!=='brief')return; const s=TSTEPS[tutStep]; if(s.end){ tutFinish(); return; } if(s.act){ tutPhase='act'; } else tutAdvance(); }
function tutAdvance(){ tutStep++; if(tutStep>=TSTEPS.length){ tutFinish(); return; } tutBrief(); }
function tutTick(){ if(tutPhase==='act'){ const s=TSTEPS[tutStep]; if(s.done&&s.done()) tutAdvance(); } }
function tutFinish(){ tutMode=false; coachMsg=''; state='menu'; showPad(false); try{localStorage.setItem('paperTut','1');}catch(e){}
  const ov=document.getElementById('ov'); ov.querySelector('h1').textContent='🟩 PAPER TERRITORY';
  ov.querySelector('.sub').innerHTML="You're ready! Hit CLAIM to play."; ov.querySelector('#start').textContent='CLAIM ▶';
  ov.querySelector('#best').innerHTML = best?('Best: '+best+'%'):''; ov.classList.remove('hidden'); }
function rrect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function drawCoach(){ if(!coachMsg)return; ctx.setTransform(DPR,0,0,DPR,0,0);
  const maxw=Math.min(W*0.92,520), pad=14, x=W/2, tx0=x-maxw/2+pad+40;
  ctx.font='600 17px Trebuchet MS'; ctx.textAlign='left'; ctx.textBaseline='top';
  const words=coachMsg.split(' '); const lines=[]; let line='';
  for(const w of words){ const t=line?line+' '+w:w; if(ctx.measureText(t).width>maxw-pad*2-44 && line){lines.push(line);line=w;} else line=t; }
  if(line)lines.push(line);
  const extra = tutPhase==='brief' ? '👉 Tap / press any key to continue' : ('▶ '+(TSTEPS[tutStep].hint||'do the action to continue…'));
  const lh=23, bh=(lines.length+1)*lh+pad*2, by=Math.max(12,H*0.05), bx=x-maxw/2;
  ctx.fillStyle='rgba(8,12,8,.9)'; rrect(bx,by,maxw,bh,14); ctx.fill(); ctx.strokeStyle='rgba(125,255,155,.75)'; ctx.lineWidth=2; rrect(bx,by,maxw,bh,14); ctx.stroke();
  ctx.font='26px serif'; ctx.fillText('🧑', bx+10, by+pad+4);
  ctx.fillStyle='#fff'; ctx.font='600 17px Trebuchet MS'; for(let i=0;i<lines.length;i++) ctx.fillText(lines[i], tx0, by+pad+i*lh);
  ctx.fillStyle='#7dff9b'; ctx.font='700 14px Trebuchet MS'; ctx.fillText(extra, tx0, by+pad+lines.length*lh+2);
}

function start(){ document.getElementById('ov').classList.add('hidden'); state='play'; showPad(true);
  owner=new Int8Array(GW*GH); trail=new Int8Array(GW*GH); parts=[]; msg=''; msgT=0; mvT=0; milestone=0;
  players=[];
  const me=spawnPlayer(1, GW>>1, GH-6, 0); players.push(me); stamp(1,me.x,me.y);
  const spots=[[8,8,1],[GW-8,10,3],[GW>>1,18,2]];
  for(let i=0;i<3;i++){ const id=i+2; const p=spawnPlayer(id, spots[i][0], spots[i][1], spots[i][2]); players.push(p); stamp(id,p.x,p.y); } }
function colOf(id){ return COLS[ colMap[(id-1)%COLS.length] % COLS.length ]; }
function pct(id){ let c=0; for(let i=0;i<owner.length;i++) if(owner[i]===id)c++; return c/(GW*GH)*100; }

function kill(p){ if(!p||!p.alive)return; p.alive=false;
  for(let i=0;i<trail.length;i++) if(trail[i]===p.id) trail[i]=0;
  for(let i=0;i<10;i++)parts.push({x:offx+(p.x+.5)*cell,y:offy+(p.y+.5)*cell,vx:rand(-180,180),vy:rand(-180,180),life:.6,c:colOf(p.id).t});
  sfx(160,.12,'sawtooth');
  if(mp.on){ p.out=true; return; }                    // MP: out for good (their claimed land stays); win checked after the step
  if(p.human){ gameOver(); } else { for(let i=0;i<owner.length;i++) if(owner[i]===p.id) owner[i]=0; p.respT=2.0; } }
function respawn(p){ let cx=ri(4,GW-4), cy=ri(4,GH-4); p.x=cx;p.y=cy;p.dir=ri(0,4);p.ndir=p.dir;p.onTrail=false;p.alive=true; stamp(p.id,cx,cy); }

const DIRS=[[1,0],[0,1],[-1,0],[0,-1]];
function step(){
  for(const p of players){
    if(!p.alive){ if(mp.on){ continue; } p.respT-=mvStep; if(p.respT<=0) respawn(p); continue; }  // MP: killed = out for good
    if(p.human){ let nd = mp.on ? mp.netDirs[p.ctrl] : p.ndir; if(nd==null) nd=p.dir; if(!opposite(nd,p.dir)) p.dir=nd; } else botThink(p);
    const nx=p.x+DIRS[p.dir][0], ny=p.y+DIRS[p.dir][1];
    if(nx<0||nx>=GW||ny<0||ny>=GH){ if(tutMode&&p.human){continue;} kill(p); continue; }
    const ti=trail[idx(nx,ny)];
    if(ti!==0){ if(ti===p.id){ if(tutMode&&p.human){continue;} kill(p); continue; } else { kill(players.find(q=>q.id===ti)); } }
    if(!p.alive) continue;                 // p may have been killed above (own trail / wall)
    p.x=nx; p.y=ny;
    const o=owner[idx(nx,ny)];
    if(o===p.id){ if(p.onTrail) closeTrail(p); }
    else { trail[idx(nx,ny)]=p.id; p.onTrail=true; }
  }
  if(mp.on){ if(mp.role==='host') mpCheckWin(); return; }
  // human milestone celebration (10/20/30/50%)
  if(players[0] && players[0].alive){ const m0=pct(1);
    for(const m of [10,20,30,50,70]){ if(m0>=m && milestone<m){ milestone=m; msg=(m>=50?'🏆 ':'🎉 ')+m+'% claimed!'; msgT=1.0; sfx(700,.12,'square'); } } }
}
function opposite(a,b){ return (a+2)%4===b; }
function closeTrail(p){ for(let i=0;i<trail.length;i++) if(trail[i]===p.id){ owner[i]=p.id; trail[i]=0; } fill(p); p.onTrail=false;
  if(p.human){ if(tutMode)tutClaimed=true; sfx(620,.08,'square'); } }
function fill(p){ const vis=new Uint8Array(GW*GH), st=[];
  for(let x=0;x<GW;x++){ pushIf(x,0,p,vis,st); pushIf(x,GH-1,p,vis,st); }
  for(let y=0;y<GH;y++){ pushIf(0,y,p,vis,st); pushIf(GW-1,y,p,vis,st); }
  while(st.length){ const c=st.pop(), x=c%GW, y=(c/GW)|0;
    for(const d of DIRS){ const nx=x+d[0],ny=y+d[1]; if(nx<0||nx>=GW||ny<0||ny>=GH)continue; pushIf(nx,ny,p,vis,st); } }
  for(let i=0;i<owner.length;i++) if(owner[i]!==p.id && !vis[i]) owner[i]=p.id; }
function pushIf(x,y,p,vis,st){ const i=idx(x,y); if(vis[i])return; if(owner[i]===p.id)return; vis[i]=1; st.push(i); }

function botThink(p){
  if(p.onTrail && Math.random()<0.18){ const h=nearestOwn(p); if(h){ const dx=Math.sign(h.x-p.x), dy=Math.sign(h.y-p.y);
      const want = Math.abs(h.x-p.x)>Math.abs(h.y-p.y) ? (dx>0?0:2) : (dy>0?1:3); if(!opposite(want,p.dir)) p.dir=want; } }
  else if(Math.random()<0.12){ const nd=ri(0,4); if(!opposite(nd,p.dir)) p.dir=nd; }
  const nx=p.x+DIRS[p.dir][0], ny=p.y+DIRS[p.dir][1];
  if(nx<0||nx>=GW||ny<0||ny>=GH){ for(let k=0;k<4;k++){ if(opposite(k,p.dir))continue; const ax=p.x+DIRS[k][0],ay=p.y+DIRS[k][1]; if(ax>=0&&ax<GW&&ay>=0&&ay<GH){p.dir=k;break;} } } }
function nearestOwn(p){ let bd=1e9,bx=null,by=null; for(let y=0;y<GH;y+=2)for(let x=0;x<GW;x+=2){ if(owner[idx(x,y)]===p.id){ const d=Math.abs(x-p.x)+Math.abs(y-p.y); if(d<bd){bd=d;bx=x;by=y;} } } return bx==null?null:{x:bx,y:by}; }

function gameOver(){ state='over'; showPad(false); const pv=Math.round(pct(1)); if(pv>best){ best=pv; saveBest(); }
  try{ if(window.IGAuth) IGAuth.submitScore('paper', best); }catch(e){}
  const ov=document.getElementById('ov'); ov.querySelector('h1').textContent='💥 POPPED!'; ov.querySelector('.sub').innerHTML='A rival crossed your trail, you crossed your own — or you hit the wall!';
  ov.querySelector('#start').textContent='PLAY AGAIN ▶'; ov.querySelector('#best').innerHTML='<div class="big">'+pv+'%</div>claimed this run • Best: '+best+'%';
  setTimeout(()=>ov.classList.remove('hidden'),500); }

function drawArenaBorder(){
  const x0=offx, y0=offy, w=cell*GW, h=cell*GH, bw=Math.max(3, cell*0.55);
  // bright wall with a danger glow so players can clearly see the edge they must not touch
  ctx.save();
  ctx.shadowColor='rgba(255,80,80,.75)'; ctx.shadowBlur=Math.max(6,cell);
  ctx.strokeStyle='#eaf2ff'; ctx.lineWidth=bw; ctx.strokeRect(x0+bw/2, y0+bw/2, w-bw, h-bw);
  ctx.restore();
  // emphasised yellow corner brackets
  const L=Math.max(16, cell*2.6);
  ctx.strokeStyle='#ffd54a'; ctx.lineWidth=bw; ctx.lineCap='round';
  const cs=[[x0,y0,1,1],[x0+w,y0,-1,1],[x0,y0+h,1,-1],[x0+w,y0+h,-1,-1]];
  for(const k of cs){ const cx=k[0],cy=k[1],sx=k[2],sy=k[3];
    ctx.beginPath(); ctx.moveTo(cx+sx*L, cy+sy*(bw/2)); ctx.lineTo(cx+sx*(bw/2), cy+sy*(bw/2)); ctx.lineTo(cx+sx*(bw/2), cy+sy*L); ctx.stroke(); }
  ctx.lineCap='butt';
}
const mvStep=0.062, mvStepMP=0.11; let last=0;
function loop(now){ requestAnimationFrame(loop); const dt=Math.min(.05,(now-last)/1000||0); last=now;
  if(state==='play'){ if(!tutMode || tutPhase==='act'){ mvT+=dt; while(mvT>=mvStep){ mvT-=mvStep; step(); if(state!=='play')break; } } if(tutMode) tutTick(); }
  else if(mp.on && state==='mpplay' && mp.role==='host'){ mvT+=dt; let n=0; while(mvT>=mvStepMP && n++<4){ mvT-=mvStepMP; step(); mp.tick++; if(state!=='mpplay')break; } mpBroadcastState(); }
  if(msgT>0)msgT-=dt;
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.fillStyle='#11131f'; ctx.fillRect(0,0,W,H);
  const tlw=Math.max(1.5, cell*0.22);
  if(owner) for(let y=0;y<GH;y++)for(let x=0;x<GW;x++){ const i=idx(x,y); const t=trail[i], o=owner[i];
    const px=offx+x*cell, py=offy+y*cell;
    if(t){ const c=colOf(t).t;                         // TRAIL = hollow glowing outline (not filled)
      ctx.globalAlpha=0.18; ctx.fillStyle=c; ctx.fillRect(px,py,cell,cell); ctx.globalAlpha=1;
      ctx.strokeStyle=c; ctx.lineWidth=tlw; ctx.strokeRect(px+tlw/2,py+tlw/2,cell-tlw,cell-tlw); }
    else if(o){ ctx.fillStyle=colOf(o).b; ctx.fillRect(px,py,cell,cell); } }   // CLAIMED land = solid fill
  if(owner) drawArenaBorder();
  if(players) for(const p of players){ if(!p.alive)continue; const c=colOf(p.id); const cx=offx+(p.x+.5)*cell, cy=offy+(p.y+.5)*cell;
    ctx.fillStyle='#fff'; ctx.beginPath();ctx.arc(cx,cy,cell*0.62,0,6.28);ctx.fill();
    ctx.fillStyle=c.t; ctx.beginPath();ctx.arc(cx,cy,cell*0.45,0,6.28);ctx.fill();
    if(mp.on && p.id===mp.slot){ ctx.strokeStyle='#fff'; ctx.lineWidth=Math.max(2,cell*0.14); ctx.beginPath();ctx.arc(cx,cy,cell*0.85,0,6.28);ctx.stroke(); } }
  if(parts){ for(const p of parts){p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt*1.6;} parts=parts.filter(p=>p.life>0);
    for(const p of parts){ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.c;ctx.fillRect(p.x,p.y,4,4);}ctx.globalAlpha=1; }
  if(state!=='menu' && state!=='lobby' && owner){ const myid=mp.on?mp.slot:1; const pv=pct(myid);
    ctx.fillStyle='#fff';ctx.font='900 30px Trebuchet MS';ctx.textAlign='left';ctx.fillText('🟩 '+pv.toFixed(1)+'%',12,34);

/* ============================================================================
   ONLINE MULTIPLAYER (Supabase Realtime, host-authoritative)
   Up to 4 players share a room; empty slots are filled with bots. The HOST runs

   players send their direction and render the received state. If the host leaves,
   the lowest-id remaining player takes over (the game keeps going).

const myId = 'u'+Math.random().toString(36).slice(2,9);

const MP={
  sb:null, ch:null, code:null, isHost:false,
  async ensure(){
    if(!(window.supabase&&window.supabase.createClient)){
      await new Promise((res,rej)=>{ const s=document.createElement('script'); s.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
        s.onload=res; s.onerror=()=>rej(new Error('cdn')); document.head.appendChild(s); }); }
    if(!this.sb) this.sb=window.supabase.createClient(window.SUPABASE_URL,window.SUPABASE_KEY,{auth:{persistSession:false}});
    return this.sb; },
  _wire(ch){ ['lobby','begin','state','dir','gameover','rematch','rematchack','ihost'].forEach(ev=>
      ch.on('broadcast',{event:ev},({payload})=>onNet(ev,payload)));
    ch.on('presence',{event:'sync'},()=>onNet('presence'));
    ch.on('presence',{event:'join'},()=>onNet('presence'));
    ch.on('presence',{event:'leave'},({leftPresences})=>onNet('leave',leftPresences)); },
  async open(code,host){ await this.ensure(); this.code=code; this.isHost=host;
    this.ch=this.sb.channel('paper-'+code,{config:{broadcast:{self:false},presence:{key:myId}}});
    this._wire(this.ch);
    await new Promise((res,rej)=>{ let done=false;
      this.ch.subscribe(st=>{ if(st==='SUBSCRIBED'&&!done){ done=true; this.ch.track({id:myId,name:PNAME,t:Date.now()}); res(); }
        else if((st==='CHANNEL_ERROR'||st==='TIMED_OUT')&&!done){ done=true; rej(new Error(st)); } }); }); },
  send(ev,payload){ if(this.ch){ try{ this.ch.send({type:'broadcast',event:ev,payload:payload||{}}); }catch(e){} } },
  presenceList(){ try{ const st=this.ch.presenceState(),a=[];
      for(const k in st){ const p=st[k]&&st[k][0]; if(p&&p.id)a.push({id:p.id,name:(p.name||'Player').slice(0,12),t:p.t||0}); }
      a.sort((x,y)=>x.t-y.t||(x.id<y.id?-1:1)); return a; }catch(e){ return []; } },

function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* ---------- start a game (host builds roster + colours) ---------- */
const SPOTS=[[GW>>1,GH-6,3],[7,8,1],[GW-8,8,1],[GW>>1,17,1]];
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; [a[i],a[j]]=[a[j],a[i]]; } return a; }

function applyBegin(pkt){

  mp.on=true; mp.role=RM.isHost?'host':'client'; mp.hostId=pkt.hostId; mp.roster=pkt.roster; colMap=pkt.colMap;
  const mine=pkt.roster.find(r=>r.ctrl===myId); mp.slot=mine?mine.slot:0;
  owner=new Int8Array(GW*GH); trail=new Int8Array(GW*GH); parts=[]; msg=''; msgT=0; mvT=0; mp.tick=0; mp.winner=0; mp.netDirs={};
  players=pkt.roster.map(r=>{ const p={id:r.slot,x:r.x,y:r.y,dir:r.dir,ndir:r.dir,onTrail:false,alive:true,out:false,human:r.human,ctrl:r.ctrl}; stamp(r.slot,r.x,r.y); return p; });

function drawCountdown(){ const left=Math.ceil((mp.countEnd-performance.now())/1000);
  ctx.setTransform(DPR,0,0,DPR,0,0); ctx.fillStyle='rgba(0,0,0,.4)'; ctx.fillRect(0,0,W,H);

  ctx.font='700 18px Trebuchet MS'; ctx.fillStyle='#bcc6e6'; ctx.textAlign='center'; ctx.fillText('You are '+colName(mp.slot), W/2, H/2+90); ctx.textAlign='left'; }

/* ---------- direction input ---------- */
function mpSetDir(d){ const me=players&&players.find(p=>p.id===mp.slot); if(!me||!me.alive||state!=='mpplay')return; if(opposite(d,me.dir))return;
  if(mp.role==='host'){ mp.netDirs[myId]=d; } else { MP.send('dir',{ctrl:myId,dir:d}); } }

/* ---------- state encode / decode (RLE) ---------- */
function rle(a){ const o=[]; let v=a[0],c=1; for(let i=1;i<a.length;i++){ if(a[i]===v)c++; else{o.push(v,c);v=a[i];c=1;} } o.push(v,c); return o; }
function unrle(runs,a){ let i=0; for(let k=0;k<runs.length;k+=2){ const v=runs[k],c=runs[k+1]; for(let j=0;j<c;j++)a[i++]=v; } }
function encodeState(){ return { t:mp.tick, o:rle(owner), r:rle(trail),
  p:players.map(p=>[p.id,p.x,p.y,p.dir,p.alive?1:0,p.onTrail?1:0]), st:state }; }
let lastSentTick=-1;
function mpBroadcastState(){ if(mp.role!=='host'||state!=='mpplay')return; if(mp.tick===lastSentTick)return; lastSentTick=mp.tick; MP.send('state',encodeState()); }
function applyState(s){ if(mp.role==='host')return; if(s.t<(mp.tick||0)-1 && state==='mpplay')return; // ignore very stale
  if(!owner){ owner=new Int8Array(GW*GH); trail=new Int8Array(GW*GH); }
  unrle(s.o,owner); unrle(s.r,trail); mp.tick=s.t;
  players=s.p.map(a=>({id:a[0],x:a[1],y:a[2],dir:a[3],alive:!!a[4],onTrail:!!a[5]}));
  if(state==='count'){ state='mpplay'; showPad(true); }
}

/* ---------- win / game over ---------- */
function mpCheckWin(){ if(mp.role!=='host'||state!=='mpplay')return; const alive=players.filter(p=>p.alive);

  else { for(const p of alive){ if(pct(p.id)>=100){ w=p.id; break; } } }

function mpHostGameOver(w){ if(state==='mpover')return; mp.winner=w; state='mpover'; lastSentTick=-1; MP.send('state',{t:mp.tick,o:rle(owner),r:rle(trail),p:players.map(p=>[p.id,p.x,p.y,p.dir,p.alive?1:0,p.onTrail?1:0]),st:'mpplay'});

function applyGameOver(pkt){ if(state==='mpover')return; mp.winner=pkt.winner; state='mpover'; showMpOver(pkt.winner); }

function rematchCountdown(){ const g=RGEN; let left=Math.ceil(REMATCH_MS/1000); const iv=setInterval(()=>{ if(g!==RGEN){clearInterval(iv);return;} left--; const e=document.getElementById('rmCd'); if(e)e.textContent=Math.max(0,left); if(left<=0)clearInterval(iv); },1000); }

/* ---------- disconnect / host migration ---------- */
function onLeave(left){ if(!RM)return; const gone=(left||[]).map(p=>p&&p.id).filter(Boolean); if(!gone.length)return;

  if(gone.includes(mp.hostId)){                       // host left -> migrate
    const presentIds=new Set(MP.presenceList().map(p=>p.id));
    const humanCtrls=(mp.roster||[]).filter(r=>r.human && presentIds.has(r.ctrl) && !gone.includes(r.ctrl)).map(r=>r.ctrl).sort();
    const newHost=humanCtrls[0];
    if(newHost===myId){ becomeHost(); } else if(newHost){ mp.hostId=newHost; }
    else { leaveRoom(); return; }                     // nobody left
  }
  if(RM.isHost){ if(RM.phase==='lobby') hostLobbyUpdate(); else if(mp.role==='host'&&state==='mpplay') mpCheckWin(); }

function becomeHost(){ MP.isHost=true; RM.isHost=true; mp.role='host'; mp.hostId=myId; RM.seq=(RM.seq||0)+1000; RM.hostId=myId;

  if(players && mp.roster){ players.forEach(p=>{ const r=mp.roster.find(x=>x.slot===p.id); if(r){ p.human=r.human; p.ctrl=r.ctrl; if(p.ndir==null)p.ndir=p.dir; } }); }
  mp.netDirs=mp.netDirs||{}; players&&players.forEach(p=>{ if(p.human&&p.ctrl && mp.netDirs[p.ctrl]==null) mp.netDirs[p.ctrl]=p.dir; });

/* ---------- net router ---------- */
function onNet(kind,payload){ if(!RM)return;
  if(!RM.isHost && payload && payload.seq!=null && ['begin','gameover','rematch'].indexOf(kind)>=0){ if(RM.lastSeq!=null && payload.seq<=RM.lastSeq)return; RM.lastSeq=payload.seq; }
  if(kind==='presence'){ if(RM.isHost&&RM.phase==='lobby') hostLobbyUpdate(); return; }
  if(kind==='leave'){ onLeave(payload); return; }
  if(kind==='lobby'){ if(!RM.isHost){ RM.hostId=payload.hostId; RM.players=payload.players||[]; if(RM.phase==='lobby') renderLobby(); } return; }
  if(kind==='begin'){ RM.phase='play'; if(!RM.isHost) applyBegin(payload); return; }

  if(kind==='gameover'){ if(!RM.isHost) applyGameOver(payload); return; }
  if(kind==='rematch'){ if(!RM.isHost){ RM.phase='play'; showRematchPrompt({by:payload.by}); } return; }
  if(kind==='rematchack'){ hostOnRematchAck(payload); return; }
  if(kind==='ihost'){ if(payload.ctrl!==myId){ mp.hostId=payload.ctrl; if(mp.role==='host'&&payload.ctrl<myId){ mp.role='client'; MP.isHost=false; RM.isHost=false; } } return; }
}
